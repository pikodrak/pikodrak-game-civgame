<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1408;color:#e0e0e0;font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh}
#menu-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;position:relative;overflow:hidden}
#menu-bg{position:absolute;top:0;left:0;width:100%;height:100%}
#menu-screen h1{font-family:'Cinzel',serif;font-size:5rem;font-weight:700;background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem;letter-spacing:8px;z-index:1}
#menu-screen .subtitle{font-family:'Cinzel',serif;color:#8090b0;font-size:1.1rem;margin-bottom:2.5rem;letter-spacing:6px;text-transform:uppercase;z-index:1}
.menu-panel{background:rgba(15,20,40,.85);border:1px solid rgba(255,215,0,.15);border-radius:16px;padding:2rem 2.5rem;width:440px;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:1}
.menu-panel label{display:block;margin-bottom:.3rem;color:#8090b0;font-size:.85rem;font-weight:500;text-transform:uppercase;letter-spacing:1px}
.menu-panel select{width:100%;padding:.65rem;margin-bottom:1.1rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e0e0e0;font-size:.95rem;font-family:inherit}
.menu-panel select:focus{outline:none;border-color:rgba(255,215,0,.4)}
.menu-panel select option{background:#0a0e1a}
.btn{display:inline-block;padding:.85rem 2rem;border:none;border-radius:10px;font-size:1.05rem;cursor:pointer;transition:all .25s;font-weight:600;font-family:'Cinzel',serif;letter-spacing:2px}
.btn-primary{background:linear-gradient(135deg,#c8960c,#ffd700,#c8960c);color:#1a1000;width:100%;margin-top:.5rem;box-shadow:0 4px 20px rgba(255,215,0,.2)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,215,0,.35)}
.btn-secondary{background:rgba(255,255,255,.06);color:#8090b0;border:1px solid rgba(255,255,255,.1);width:100%;margin-top:.5rem;font-family:'Inter',sans-serif;font-size:.9rem;letter-spacing:1px}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
#game-screen{display:none;height:100vh}
#top-bar{height:48px;background:linear-gradient(180deg,rgba(30,22,10,.98),rgba(20,15,6,.99));border-bottom:2px solid rgba(200,150,0,.25);display:flex;align-items:center;padding:0 .8rem;gap:.6rem;font-size:.85rem;z-index:10}
.resource-item{display:flex;align-items:center;gap:.3rem;padding:.25rem .5rem;background:rgba(255,255,255,.05);border-radius:5px;border:1px solid rgba(255,255,255,.08)}
.resource-icon{font-size:.95rem}.resource-val{font-weight:700;color:#fff;font-size:.88rem;min-width:24px;text-align:right}
.resource-label{font-size:.65rem;color:#6a7a9a;text-transform:uppercase;letter-spacing:.5px}
#turn-info{margin-left:auto;color:#a0a8c0;font-family:'Cinzel',serif;font-size:.9rem;white-space:nowrap}
.top-btn{padding:.35rem .7rem;border:1px solid;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:500;transition:all .15s;background:transparent;font-family:inherit;white-space:nowrap}
#btn-end-turn{padding:.4rem 1.1rem;background:linear-gradient(135deg,#c8960c,#ffd700);color:#1a1000;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:.85rem;font-family:'Cinzel',serif;letter-spacing:1px}
#game-area{display:flex;height:calc(100vh - 48px)}
#map-container{flex:1;position:relative;overflow:hidden;background:#0a1520}
#game-canvas{position:absolute;top:0;left:0;cursor:grab}#game-canvas:active{cursor:grabbing}
#minimap-container{position:absolute;bottom:10px;left:10px;border:2px solid rgba(200,150,0,.25);border-radius:6px;background:rgba(0,0,0,.75);z-index:5;overflow:hidden}
#minimap{display:block}
#right-panel{width:300px;background:linear-gradient(180deg,rgba(30,22,10,.98),rgba(20,15,6,.99));border-left:2px solid rgba(200,150,0,.15);overflow-y:auto;padding:.6rem;font-size:.82rem}
.panel-section{background:rgba(255,220,150,.04);border:1px solid rgba(200,150,0,.12);border-radius:8px;padding:.7rem;margin-bottom:.5rem}
.panel-section h3{font-family:'Cinzel',serif;color:#e8c040;font-size:.88rem;margin-bottom:.4rem;border-bottom:1px solid rgba(200,150,0,.2);padding-bottom:.35rem}
.info-row{display:flex;justify-content:space-between;padding:.2rem 0;align-items:center}.info-label{color:#7888b0;font-size:.8rem}.info-value{color:#e0e8ff;font-weight:600;font-size:.85rem}
.prod-list{max-height:300px;overflow-y:auto}
.prod-item{padding:.5rem .6rem;margin:.2rem 0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:6px;cursor:pointer;transition:all .12s}
.prod-item:hover{background:rgba(200,150,0,.12);border-color:rgba(200,150,0,.35);transform:translateX(3px)}
.prod-name{font-weight:600;color:#d8e0f0;font-size:.84rem}.prod-stats{font-size:.75rem;color:#6878a8;margin-top:.1rem}
.action-btn{padding:.35rem .65rem;margin:.15rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#c8d0e8;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .12s}
.action-btn:hover{background:rgba(200,150,0,.15);border-color:rgba(200,150,0,.4);color:#fff}
#events-log{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
.event-msg{background:rgba(5,10,25,.92);padding:.5rem 1.2rem;border-radius:8px;font-size:.85rem;color:#ffd700;border:1px solid rgba(255,215,0,.2);animation:fadeUp 4s forwards;pointer-events:none}
@keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}10%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:linear-gradient(135deg,#1e1508,#2a1c0c);border:1px solid rgba(255,195,0,.2);border-radius:16px;padding:1.5rem 2rem;max-width:750px;max-height:82vh;overflow-y:auto;width:92%}
.modal h2{font-family:'Cinzel',serif;color:#ffd700;margin-bottom:1.2rem;font-size:1.4rem}
.modal .close-btn{float:right;background:none;border:none;color:#5060a0;font-size:1.6rem;cursor:pointer}
.tech-era{margin-bottom:1.2rem}.tech-era h4{font-family:'Cinzel',serif;color:#6090c0;margin-bottom:.5rem}
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.5rem}
.tech-card{padding:.65rem;background:rgba(255,220,150,.03);border:1px solid rgba(255,195,0,.1);border-radius:8px;cursor:pointer;transition:all .2s}
.tech-card:hover{border-color:rgba(100,150,220,.4)}.tech-card.researched{border-color:rgba(46,204,113,.4);background:rgba(46,204,113,.06)}.tech-card.current{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06)}.tech-card.unavailable{opacity:.35;cursor:not-allowed}
.tech-card .tech-name{font-weight:600;font-size:.88rem;color:#c0c8e0}.tech-card .tech-cost{font-size:.78rem;color:#5060a0}.tech-card .tech-unlocks{font-size:.73rem;color:#4080c0;margin-top:.2rem}
.diplo-player{display:flex;align-items:center;gap:.8rem;padding:.7rem;margin:.4rem 0;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px}
.diplo-color{width:24px;height:24px;border-radius:50%}.diplo-status{margin-left:auto;font-size:.85rem;font-weight:600}
.diplo-status.war{color:#e74c3c}.diplo-status.peace{color:#2ecc71}.diplo-status.neutral{color:#f1c40f}
.diplo-btn{padding:.35rem .65rem;border:1px solid;border-radius:6px;background:none;cursor:pointer;font-size:.8rem;margin-left:.3rem;font-family:inherit}
#game-over-screen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,10,4,.94);z-index:200;align-items:center;justify-content:center;flex-direction:column}
#game-over-screen.active{display:flex}#game-over-screen h1{font-family:'Cinzel',serif;font-size:4rem;margin-bottom:1rem}
#game-over-screen .victory{color:#ffd700}#game-over-screen .defeat{color:#e74c3c}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,215,0,.15);border-radius:3px}
#city-name-dialog{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;background:linear-gradient(135deg,#1e1508,#2a1c0c);border:2px solid rgba(255,195,0,.3);border-radius:16px;padding:2rem;text-align:center}
#city-name-dialog h3{font-family:'Cinzel',serif;color:#ffd700;margin-bottom:1.2rem}
#city-name-dialog input{padding:.6rem;width:220px;background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.2);border-radius:8px;color:#fff;font-size:1rem;text-align:center;font-family:inherit}
.save-item{padding:.7rem;margin:.3rem 0;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.save-item:hover{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.2)}
.hp-bar-bg{background:rgba(255,255,255,.1);border-radius:3px;height:4px;margin-top:.3rem;overflow:hidden}.hp-bar-fill{height:100%;border-radius:3px}
.progress-bar-bg{background:rgba(255,255,255,.08);border-radius:4px;height:6px;margin-top:.3rem;overflow:hidden}.progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#c8960c,#ffd700)}
</style>

<body>
<div id="menu-screen"><canvas id="menu-bg"></canvas><h1>CIVGAME</h1><p class="subtitle">Turn-Based Strategy</p>
<div class="menu-panel">
<label>Civilization</label><select id="menu-civ"><option value="rome">Rome +15% Production</option><option value="egypt">Egypt +15% Culture</option><option value="greece">Greece +15% Science</option><option value="china">China +15% Food</option><option value="persia">Persia +15% Gold</option><option value="aztec">Aztec +15% Military</option><option value="japan">Japan +15% Defense</option><option value="czech">Czech +20% Prod & Science</option><option value="mongol">Mongol +15% Movement</option></select>
<label>Map</label><select id="menu-mapsize"><option value="30,20">Small</option><option value="40,30" selected>Medium</option><option value="55,40">Large</option><option value="130,95">Huge (10x)</option></select>
<label>Opponents</label><select id="menu-players"><option value="2">1</option><option value="3">2</option><option value="4" selected>3</option><option value="5">4</option><option value="6">5</option></select>
<button class="btn btn-primary" onclick="startGame()">New Game</button><button class="btn btn-secondary" onclick="openLoadDialog()">Load Game</button><div style="margin-top:.8rem;border-top:1px solid rgba(255,128,96,.15);padding-top:.8rem">
<label style="color:#ff8060">Debug Simulation</label>
<div style="display:flex;gap:.5rem;margin-bottom:.4rem">
<div style="flex:1"><label style="font-size:.75rem">Map</label><select id="sim-map" style="width:100%;padding:.4rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,128,96,.2);border-radius:6px;color:#e0e0e0;font-size:.85rem"><option value="30,20">Small</option><option value="40,30" selected>Medium</option><option value="55,40">Large</option><option value="130,95">Huge</option></select></div>
<div style="flex:1"><label style="font-size:.75rem">Players</label><input id="sim-players" type="number" value="4" min="2" max="8" style="width:100%;padding:.4rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,128,96,.2);border-radius:6px;color:#e0e0e0;font-size:.85rem"></div>
</div>
<div style="display:flex;gap:.5rem;margin-bottom:.4rem">
<div style="flex:1"><label style="font-size:.75rem">Turns</label><input id="sim-turns" type="number" value="100" min="10" max="500" style="width:100%;padding:.4rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,128,96,.2);border-radius:6px;color:#e0e0e0;font-size:.85rem"></div>
<div style="flex:1"><label style="font-size:.75rem">Seed</label><input id="sim-seed" type="number" placeholder="random" style="width:100%;padding:.4rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,128,96,.2);border-radius:6px;color:#e0e0e0;font-size:.85rem"></div>
</div>
<button class="btn btn-secondary" id="sim-btn" onclick="runSimulation()" style="color:#ff8060;border-color:rgba(255,128,96,.3)">Run Simulation</button>
<pre id="sim-result" style="display:none;margin-top:.5rem;font-size:.72rem;color:#c0a080;max-height:200px;overflow-y:auto;background:rgba(0,0,0,.3);padding:.5rem;border-radius:6px;white-space:pre-wrap"></pre>
</div>
</div></div>
<div id="game-screen"><div id="top-bar">
<div class="resource-item"><span class="resource-icon" style="color:#ffd700">&#9733;</span><div><span class="resource-val" id="res-gold">0</span><div class="resource-label">Gold</div></div></div>
<div class="resource-item"><span class="resource-icon" style="color:#60a0ff">&#9881;</span><div><span class="resource-val" id="res-science">--</span><div class="resource-label">Science</div></div></div>
<div class="resource-item"><span class="resource-icon" style="color:#c490ff">&#9829;</span><div><span class="resource-val" id="res-culture">0</span><div class="resource-label">Culture</div></div></div>
<div class="resource-item"><span class="resource-icon" style="color:#ff6060">&#9876;</span><div><span class="resource-val" id="res-military">0</span><div class="resource-label">Army</div></div></div>
<div style="display:flex;gap:4px">
<button class="top-btn" style="color:#60a0ff;border-color:rgba(96,160,255,.3)" onclick="openTechTree()">Research</button>
<button class="top-btn" style="color:#c490ff;border-color:rgba(196,144,255,.3)" onclick="openDiplomacy()">Diplomacy</button>
<button class="top-btn" style="color:#60c080;border-color:rgba(96,192,128,.3)" onclick="saveGame()">Save</button>
<button class="top-btn" style="color:#e07050;border-color:rgba(224,112,80,.3)" onclick="quitGame()">Quit</button>
</div>
<span id="turn-info">Turn 1</span><button id="btn-end-turn" onclick="endTurn()">End Turn</button>
</div><div id="game-area"><div id="map-container"><canvas id="game-canvas"></canvas><div id="minimap-container"><canvas id="minimap" width="200" height="150"></canvas></div><div id="events-log"></div></div>
<div id="right-panel"><div id="panel-content"><div class="panel-section"><h3>Welcome</h3><p style="color:#4060a0">Click a unit or city</p></div></div></div></div></div>
<div id="city-name-dialog"><h3>Found New City</h3><input type="text" id="city-name-input" maxlength="20"><br><button class="btn btn-primary" onclick="confirmFoundCity()" style="width:auto;padding:.6rem 2rem">Found</button><button class="action-btn" onclick="closeCityDialog()" style="margin-left:.5rem">Cancel</button></div>
<div class="modal-overlay" id="tech-modal"><div class="modal"><button class="close-btn" onclick="closeTechTree()">&times;</button><h2>Technology Tree</h2><div id="tech-tree-content"></div></div></div>
<div class="modal-overlay" id="diplo-modal"><div class="modal"><button class="close-btn" onclick="closeDiplomacy()">&times;</button><h2>Diplomacy</h2><div id="diplo-content"></div></div></div>
<div class="modal-overlay" id="prod-modal"><div class="modal" style="max-width:500px"><button class="close-btn" onclick="closeProdModal()">&times;</button><h2 id="prod-modal-title">Build</h2><div id="prod-modal-content"></div></div></div>
<div class="modal-overlay" id="load-modal"><div class="modal"><button class="close-btn" onclick="closeLoadDialog()">&times;</button><h2>Load Game</h2><div id="load-content"></div></div></div>
<div id="game-over-screen"><h1 id="game-over-title"></h1><p id="game-over-msg" style="font-size:1.2rem;margin-bottom:2rem;color:#8090b0"></p><button class="btn btn-primary" onclick="location.reload()" style="width:auto">Play Again</button></div>

<script>
'use strict';
let gameId,state,selectedUnit,selectedCity,pendingSettler,camX=0,camY=0,camZoom=1,isDragging=false,dragStartX=0,dragStartY=0,dragCamX=0,dragCamY=0,T=0;
// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r||0,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();return this}}
window.onerror=function(m,s,l){document.title='ERR: '+m;console.error(m,s,l)};

// Preload sprite images
const unitImgs={},bldImgs={},terrImgs={};
const UNIT_NAMES=['warrior','spearman','archer','swordsman','horseman','knight','catapult','musketman','rifleman','infantry','artillery','tank','fighter','bomber','settler','worker','spy','caravan','galley','caravel','ironclad'];
const TERR_NAMES=['grass','plains','forest','hills','mountain','desert','water','coast'];
const BLD_NAMES=['palace','granary','library','walls','marketplace','aqueduct','temple','monastery','castle','university','bank','observatory','factory','power_plant','nuclear_plant'];
for(const n of UNIT_NAMES){const i=new Image();i.src=`/static/img/units/${n}.png`;unitImgs[n]=i}
for(const n of TERR_NAMES){const i=new Image();i.src=`/static/img/terrain/${n}.png`;terrImgs[n]=i}
for(const n of BLD_NAMES){const i=new Image();i.src=`/static/img/buildings/${n}.png`;bldImgs[n]=i}
const S=28,S3=Math.sqrt(3),canvas=document.getElementById('game-canvas'),ctx=canvas.getContext('2d'),miniC=document.getElementById('minimap'),miniX=miniC.getContext('2d');
const tileCache={};

// ======== MENU BG ========
!function(){const c=document.getElementById('menu-bg'),x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight}r();addEventListener('resize',r);const st=Array.from({length:180},()=>({x:Math.random(),y:Math.random(),s:Math.random()*.7+.3,p:Math.random()*6})),nb=Array.from({length:4},()=>({x:Math.random(),y:Math.random(),r:Math.random()*200+80,h:Math.random()*60+200}));!function d(t){x.fillStyle='#06081a';x.fillRect(0,0,c.width,c.height);for(const n of nb){const g=x.createRadialGradient(n.x*c.width,n.y*c.height,0,n.x*c.width,n.y*c.height,n.r);g.addColorStop(0,`hsla(${n.h},50%,15%,.12)`);g.addColorStop(1,`hsla(${n.h},50%,15%,0)`);x.fillStyle=g;x.fillRect(0,0,c.width,c.height)}for(const s of st){x.fillStyle=`rgba(200,210,255,${(.3+Math.sin(t*.001+s.p)*.3)*s.s})`;x.beginPath();x.arc(s.x*c.width,s.y*c.height,s.s*1.5,0,6.3);x.fill()}requestAnimationFrame(d)}(0)}();

// ======== HEX MATH (odd-r pointy) ========
function h2p(q,r){return[S3*S*(q+.5*(r&1)),1.5*S*r]}
function p2h(sx,sy){const mx=(sx+camX)/camZoom,my=(sy+camY)/camZoom;let bq=0,br=0,bd=1e9;const ar=Math.round(my/(1.5*S)),aq=Math.round((mx-.5*(ar&1)*S3*S)/(S3*S));for(let dr=-2;dr<=2;dr++)for(let dq=-2;dq<=2;dq++){const[hx,hy]=h2p(aq+dq,ar+dr),d=(hx-mx)**2+(hy-my)**2;if(d<bd){bd=d;bq=aq+dq;br=ar+dr}}return[bq,br]}
function hNb(q,r){return r&1?[[q,r-1],[q+1,r-1],[q+1,r],[q,r+1],[q+1,r+1],[q-1,r]]:[[q-1,r-1],[q,r-1],[q+1,r],[q,r+1],[q-1,r+1],[q-1,r]]}
function hD(a,b,c,d){const f=(q,r)=>{const x=q-(r-(r&1))/2;return[x,-x-r,r]};const[x1,y1,z1]=f(a,b),[x2,y2,z2]=f(c,d);return Math.max(Math.abs(x1-x2),Math.abs(y1-y2),Math.abs(z1-z2))}
function hexP(c,x,y,s){c.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2,px=x+s*Math.cos(a),py=y+s*Math.sin(a);i?c.lineTo(px,py):c.moveTo(px,py)}c.closePath()}
function Hf(a,b){let h=(a*374761393+b*668265263+a*b*131)^0x5bf03635;h=((h>>13)^h)*1274126177;return((h>>16)^h&0x7fffffff)/0x7fffffff}

// ======== API ========
async function api(p,m='GET',b=null){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);return(await fetch(p,o)).json()}

// ======== GAME FLOW ========
// ======== SIMULATION ========
async function runSimulation(){
    const[w,h]=document.getElementById('sim-map').value.split(',').map(Number);
    const n=+document.getElementById('sim-players').value;
    const turns=+document.getElementById('sim-turns').value;
    const seedEl=document.getElementById('sim-seed');
    const seed=seedEl.value?+seedEl.value:null;
    const btn=document.getElementById('sim-btn');
    const out=document.getElementById('sim-result');
    btn.textContent='Simulating...';btn.disabled=true;out.style.display='block';out.textContent='Running...';
    try{
        const log=await api('/api/simulate','POST',{width:w,height:h,num_players:n,num_turns:turns,seed});
        let s=`=== ${log.result.final_turn} TURNS | ${w}x${h} | ${n}p | seed=${seed||'random'} ===\n`;
        s+=`Winner: ${log.result.winner||'NONE'}\n\n`;
        s+='SCORES:\n';
        for(const p of log.result.scores)s+=`  ${p.name}: ${p.score}pts ${p.cities}c ${p.units}u ${p.techs}t ${p.alive?'':'DEAD'}\n`;
        // Key events
        s+='\nKEY EVENTS:\n';
        let combat=0,founded=0,captured=0,deaths=0;
        for(const t of log.turns)for(const e of t.events){
            if(typeof e==='string'){
                if(e.includes('founded'))founded++;
                if(e.includes('captured')){captured++;s+=`  T${t.turn}: ${e}\n`}
                if(e.includes('destroyed')){deaths++;s+=`  T${t.turn}: ${e}\n`}
                if(e.includes('Victory'))s+=`  T${t.turn}: ${e}\n`;
            }
        }
        s+=`\nStats: ${founded} cities founded, ${captured} captured, ${deaths} combat deaths\n`;
        // IDLE analysis
        let idle=0;
        for(const t of log.turns)for(const e of t.events)if(typeof e==='object')idle+=e.cities.filter(c=>c.producing==='IDLE').length;
        s+=`IDLE city-turns: ${idle}\n`;
        s+=`\nFull log: saves/sim_log.json`;
        out.textContent=s;
    }catch(e){out.textContent='Error: '+e.message}
    btn.textContent='Run Simulation';btn.disabled=false;
}

async function autoSave(){
    if(!gameId)return;
    try{await api(`/api/game/${gameId}/save`,'POST');localStorage.setItem('civgame_last',`save_${gameId}.json`)}catch(e){}
}
async function tryAutoLoad(){

    if(!fn)return false;
    try{
        const saves=await api('/api/saves');
        if(!saves.find(s=>s.filename===fn))return false;
        const d=await api(`/api/load/${fn}`,'POST');
        gameId=d.game_id;state=d.state;return true;
    }catch(e){return false}
}

function render(){
    if(!state)return;
    const W=canvas.width,H=canvas.height;
    if(W===0||H===0)return;
    ctx.fillStyle='#0a1520';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.scale(camZoom,camZoom);
    const ox=camX/camZoom,oy=camY/camZoom,pad=S*3,tiles=state.tiles;

    // TERRAIN
    for(const k in tiles){const[q,r]=k.split(',').map(Number);const[px,py]=h2p(q,r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;let c=tileCache[k];if(!c){c=document.createElement('canvas');c.width=c.height=S*4;const x=c.getContext('2d');try{x.translate(S*2,S*2);renderTile(x,tiles[k],q,r)}catch(e){console.error('renderTile error:',k,tiles[k],e)}tileCache[k]=c}ctx.drawImage(c,sx-S*2,sy-S*2)}

    // ANIMATED WATER
    for(const k in tiles){const t=tiles[k];if(t!=='water'&&t!=='coast')continue;const[q,r]=k.split(',').map(Number);const[px,py]=h2p(q,r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;drawWaterFX(sx,sy,t,q,r)}

    // FOG OF WAR - darken explored but not currently visible tiles
    if(state.visible){const vs=new Set(state.visible);for(const k in tiles){if(vs.has(k))continue;const[q,r]=k.split(',').map(Number);const[px,py]=h2p(q,r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;ctx.save();ctx.globalAlpha=.55;hexP(ctx,sx,sy,S);ctx.fillStyle='#000';ctx.fill();ctx.restore()}}

    // TERRITORY — fill + thick border line at edge
    for(const city of state.cities){const pc=state.players.find(p=>p.id===city.player)?.color||'#888';const br=city.border_radius||1;for(let dq=-br;dq<=br;dq++)for(let dr=-br;dr<=br;dr++){const d=hD(city.q,city.r,city.q+dq,city.r+dr);if(d>br||!tiles[`${city.q+dq},${city.r+dr}`])continue;const[px,py]=h2p(city.q+dq,city.r+dr),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;
        // Light fill
        ctx.save();ctx.globalAlpha=d===br?.05:.08;hexP(ctx,sx,sy,S);ctx.fillStyle=pc;ctx.fill();ctx.restore();
        // Thick border on edge hexes — draw only edges that face outside territory
        if(d===br){const nb=hNb(city.q+dq,city.r+dr);for(let i=0;i<6;i++){const[nq,nr]=nb[i];const nd=hD(city.q,city.r,nq,nr);if(nd>br||!tiles[`${nq},${nr}`]){
            // This edge faces outside — draw thick line
            const a1=Math.PI/3*i-Math.PI/2,a2=Math.PI/3*(i+1)-Math.PI/2;
            ctx.save();ctx.globalAlpha=.55;ctx.strokeStyle=pc;ctx.lineWidth=3;ctx.lineCap='round';
            ctx.beginPath();ctx.moveTo(sx+S*Math.cos(a1),sy+S*Math.sin(a1));ctx.lineTo(sx+S*Math.cos(a2),sy+S*Math.sin(a2));ctx.stroke();ctx.restore()}}}}}

    // SELECTION
    if(selectedUnit){const u=state.units.find(u=>u.id===selectedUnit);if(u){const[px,py]=h2p(u.q,u.r),sx=px-ox,sy=py-oy;ctx.save();ctx.globalAlpha=.1+Math.sin(T*5)*.07;hexP(ctx,sx,sy,S+3);ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();hexP(ctx,sx,sy,S);ctx.fillStyle='#fff';ctx.fill();ctx.restore();if(u.moves_left>0)for(const[nq,nr]of hNb(u.q,u.r)){const k=`${nq},${nr}`;if(!tiles[k])continue;const t=tiles[k];if((t==='water'||t==='coast')&&u.cat!=='naval'&&u.cat!=='air')continue;if(t==='mountain'&&u.cat!=='air')continue;const[np,ny]=h2p(nq,nr),nx=np-ox,ns=ny-oy;const en=state.units.some(x=>x.q===nq&&x.r===nr&&x.player!==0)||state.cities.some(c=>c.q===nq&&c.r===nr&&c.player!==0);ctx.save();ctx.globalAlpha=.15+Math.sin(T*3)*.05;hexP(ctx,nx,ns,S);ctx.fillStyle=en?'#ff3030':'#30ff70';ctx.fill();ctx.globalAlpha=.5;hexP(ctx,nx,ns,S);ctx.strokeStyle=en?'#ff3030':'#30ff70';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);ctx.restore()}}}
    if(selectedCity){const c=state.cities.find(c=>c.id===selectedCity);if(c){const br=c.border_radius||1;for(let dq=-br;dq<=br;dq++)for(let dr=-br;dr<=br;dr++){if(hD(0,0,dq,dr)>br)continue;const[px,py]=h2p(c.q+dq,c.r+dr);ctx.save();ctx.globalAlpha=.06+Math.sin(T*2+dq)*.03;hexP(ctx,px-ox,py-oy,S);ctx.fillStyle='#ffd700';ctx.fill();ctx.restore()}}}

    // CITIES
    for(const c of state.cities){const[px,py]=h2p(c.q,c.r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;drawCity(sx,sy,c,state.players.find(p=>p.id===c.player)?.color||'#888')}

    // UNITS
    for(const u of state.units){const[px,py]=h2p(u.q,u.r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;drawUnit(sx,sy,u,state.players.find(p=>p.id===u.player)?.color||'#888',u.id===selectedUnit)}

    ctx.restore();
}

//  RENDERING — CATAN BOARD GAME STYLE
// ============================================================

// Clean, bold flat colors
const TPAL={
    grass:  [106,168,60],  plains: [218,190,82],  forest: [55,115,42],
    hills:  [175,120,65],  mountain:[140,145,158], desert: [225,205,148],
    water:  [42,95,155],   coast:  [72,135,175],
};

function renderTile(c,type,q,r){
    // Try PNG terrain tile first
    const tImg=terrImgs[type];
    if(tImg&&tImg.complete&&tImg.naturalWidth>0){
        hexP(c,0,0,S);c.save();c.clip();
        c.drawImage(tImg,-S,-S,S*2,S*2);
        // Subtle variation per tile
        const h1=Hf(q,r);
        c.globalAlpha=0.04+h1*0.04;c.fillStyle=h1>.5?'rgba(255,255,200,.1)':'rgba(0,0,30,.1)';
        c.fillRect(-S,-S,S*2,S*2);
        c.restore();
        hexP(c,0,0,S);c.strokeStyle='rgba(40,30,15,.2)';c.lineWidth=1;c.stroke();
        return;
    }
    const h1=Hf(q,r),h2=Hf(q+999,r+777);
    const base=TPAL[type]||[80,80,80];
    // Flat fill with very subtle variation
    const j=(h1-.5)*6;
    hexP(c,0,0,S);
    c.fillStyle=`rgb(${base[0]+j|0},${base[1]+j|0},${base[2]+j|0})`;
    c.fill();

    hexP(c,0,0,S);c.save();c.clip();

    // Subtle inner glow — clean board feel
    const ao=c.createRadialGradient(0,-S*.15,S*.15,0,S*.1,S*1.05);
    ao.addColorStop(0,'rgba(255,255,255,.06)');ao.addColorStop(.5,'rgba(0,0,0,0)');ao.addColorStop(1,'rgba(0,0,0,.12)');
    c.fillStyle=ao;c.fillRect(-S*2,-S*2,S*4,S*4);

    // ===== ICONIC TERRAIN ELEMENTS =====
    if(type==='grass'){
        // Simple rolling green — subtle darker patches
        for(let i=0;i<4;i++){
            const dx=(Hf(q*7+i,r*3+i)-.5)*S*.8,dy=(Hf(q*3+i,r*7+i)-.5)*S*.6;
            c.fillStyle='rgba(75,140,45,.15)';
            c.beginPath();c.ellipse(dx,dy,S*.25+h1*S*.1,S*.15,Hf(i,q)*1.5,0,6.3);c.fill();
        }
    }
    else if(type==='plains'){
        // Wheat sheaves — clean iconic style
        c.lineCap='round';c.lineJoin='round';
        const sx2=[[-.3,-.1],[.15,.05],[-.1,.2],[.28,-.2]];
        for(const[ox,oy]of sx2){
            const bx=ox*S,by=oy*S;
            // Stalk bundle
            for(let i=-1;i<=1;i++){
                c.strokeStyle='rgba(180,150,50,.5)';c.lineWidth=1.2;
                c.beginPath();c.moveTo(bx+i*2,by+S*.12);c.lineTo(bx+i*1.5,by-S*.12);c.stroke();
            }
            // Wheat head
            c.fillStyle='rgba(200,170,55,.6)';
            c.beginPath();c.ellipse(bx,by-S*.14,3,5,0,0,6.3);c.fill();
        }
        c.lineCap='butt';c.lineJoin='miter';
    }
    else if(type==='forest'){
        // Clean triangular trees — Catan style
        const trees=[[0,-.05,.9],[-.28,.12,.7],[.25,.08,.75],[-.12,-.22,.65],[.15,.25,.6]];
        for(const[tx,ty,ts]of trees){
            const bx=tx*S,by=ty*S,sz=S*.3*ts;
            // Shadow
            c.fillStyle='rgba(0,0,0,.12)';c.beginPath();c.ellipse(bx+1.5,by+sz*.55,sz*.4,sz*.12,0,0,6.3);c.fill();
            // Trunk
            c.fillStyle='#5a3a1a';c.fillRect(bx-1.5,by,3,sz*.4);
            // Tree — simple triangle layers
            c.fillStyle='#3a7a28';
            c.beginPath();c.moveTo(bx,by-sz*.9);c.lineTo(bx-sz*.55,by+sz*.05);c.lineTo(bx+sz*.55,by+sz*.05);c.closePath();c.fill();
            c.fillStyle='#4a8a35';
            c.beginPath();c.moveTo(bx,by-sz*.55);c.lineTo(bx-sz*.45,by+sz*.15);c.lineTo(bx+sz*.45,by+sz*.15);c.closePath();c.fill();
            // Highlight
            c.fillStyle='rgba(255,255,255,.08)';
            c.beginPath();c.moveTo(bx,by-sz*.9);c.lineTo(bx-sz*.15,by-sz*.3);c.lineTo(bx,by-sz*.4);c.closePath();c.fill();
        }
    }
    else if(type==='hills'){
        // Clay/brick hills — warm Catan style
        const hills=[[-.15,0,.4,.22],[.2,-.05,.32,.18],[-.02,.2,.25,.14]];
        for(const[hx,hy,hw,hh]of hills){
            const cx=hx*S,cy=hy*S;
            // Hill mound
            c.fillStyle='rgba(155,100,48,.35)';
            c.beginPath();c.ellipse(cx,cy,S*hw,S*hh,0,Math.PI,0);c.fill();
            // Highlight
            c.fillStyle='rgba(200,145,72,.2)';
            c.beginPath();c.ellipse(cx-S*hw*.2,cy-S*hh*.3,S*hw*.5,S*hh*.4,0,Math.PI,0);c.fill();
        }
        // Brick/clay blocks
        for(let i=0;i<3;i++){
            const bx=(Hf(i*7+q,i*3+r)-.5)*S*.5,by=S*(.08+Hf(i+q,r)*.15);
            c.fillStyle='rgba(160,95,45,.3)';c.fillRect(bx-3,by-2,6,4);
            c.strokeStyle='rgba(120,70,30,.2)';c.lineWidth=.5;c.strokeRect(bx-3,by-2,6,4);
        }
    }
    else if(type==='mountain'){
        // Bold geometric mountains — Catan ore style
        // Back peak
        c.fillStyle='#8a8a98';c.beginPath();c.moveTo(S*.25,-S*.35);c.lineTo(S*.5,S*.3);c.lineTo(0,S*.3);c.closePath();c.fill();
        // Main peak — dark side
        c.fillStyle='#6a6a78';c.beginPath();c.moveTo(0,-S*.7);c.lineTo(S*.4,S*.32);c.lineTo(0,S*.32);c.closePath();c.fill();
        // Main peak — light side
        c.fillStyle='#9898a8';c.beginPath();c.moveTo(0,-S*.7);c.lineTo(-S*.38,S*.32);c.lineTo(0,S*.32);c.closePath();c.fill();
        // Snow cap
        c.fillStyle='#e5e5f0';c.beginPath();c.moveTo(0,-S*.7);c.lineTo(-S*.1,-S*.35);c.lineTo(S*.12,-S*.38);c.closePath();c.fill();
        // Rock texture lines
        c.strokeStyle='rgba(60,60,72,.12)';c.lineWidth=.8;
        c.beginPath();c.moveTo(-S*.15,-S*.1);c.lineTo(S*.1,0);c.stroke();
        c.beginPath();c.moveTo(-S*.1,S*.15);c.lineTo(S*.15,S*.1);c.stroke();
    }
    else if(type==='desert'){
        // Clean sandy desert with gentle dunes
        for(let i=0;i<3;i++){
            const dy=(i-1)*S*.2;
            c.fillStyle='rgba(210,185,115,.15)';
            c.beginPath();c.ellipse(0,dy,S*.6,S*.1,0,0,6.3);c.fill();
        }
        // Cactus on some tiles
        if(h1>.65){
            c.strokeStyle='#6a9a40';c.lineWidth=2.5;c.lineCap='round';
            c.beginPath();c.moveTo(0,S*.12);c.lineTo(0,-S*.18);c.stroke();
            c.lineWidth=2;
            c.beginPath();c.moveTo(0,-S*.06);c.quadraticCurveTo(-S*.08,-S*.08,-S*.1,-S*.16);c.stroke();
            c.beginPath();c.moveTo(0,-S*.02);c.quadraticCurveTo(S*.07,-S*.04,S*.08,-S*.12);c.stroke();
            c.lineCap='butt';
        }
    }
    else if(type==='water'){
        // Deep blue ocean — clean
        c.fillStyle='rgba(30,70,130,.08)';c.fillRect(-S,-S,S*2,S*2);
    }
    else if(type==='coast'){
        // Lighter coastal blue with subtle sand
        c.fillStyle='rgba(60,120,165,.06)';c.fillRect(-S,-S,S*2,S*2);
        c.fillStyle='rgba(200,190,150,.06)';
        c.beginPath();c.ellipse(S*.2,S*.1,S*.3,S*.15,.4,0,6.3);c.fill();
    }

    c.restore();
    // Bold hex border — clean board game feel
    hexP(c,0,0,S);c.strokeStyle='rgba(40,30,15,.25)';c.lineWidth=1.2;c.stroke();
}

function drawWaterFX(sx,sy,type,q,r){
    hexP(ctx,sx,sy,S);ctx.save();ctx.clip();
    const deep=type==='water';
    // Clean wave lines
    for(let i=0;i<(deep?3:2);i++){
        const wy=sy+(i-(deep?1:0))*S*.3+Math.sin(T*.5+q*.4+i*1.5)*2;
        ctx.strokeStyle=`rgba(80,150,220,${0.06+Math.sin(T*.7+i*2+r*.3)*.02})`;ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(sx-S*.4,wy);ctx.bezierCurveTo(sx-S*.1,wy-2,sx+S*.1,wy+2,sx+S*.4,wy);ctx.stroke();
    }
    ctx.restore();
}

function drawCity(sx,sy,city,col){
    const s=S*.35,pop=city.population||1;ctx.save();
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(sx+1,sy+s*1.1,s*1.4,s*.3,0,0,6.3);ctx.fill();
    // Base platform
    ctx.fillStyle=dk(col,20);ctx.beginPath();ctx.roundRect(sx-s*1.2,sy-s*.15,s*2.4,s*.8,2);ctx.fill();
    ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(sx-s*1.2,sy-s*.35,s*2.4,s*.7,2);ctx.fill();
    // Main building
    ctx.fillStyle=dk(col,10);ctx.beginPath();ctx.roundRect(sx-s*.5,sy-s*.7,s*1,s*.5,1);ctx.fill();
    // Roof
    ctx.fillStyle=dk(col,40);ctx.beginPath();ctx.moveTo(sx-s*.6,sy-s*.7);ctx.lineTo(sx,sy-s*1.15);ctx.lineTo(sx+s*.6,sy-s*.7);ctx.closePath();ctx.fill();
    // Tower — grows with pop
    if(pop>=2){ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(sx+s*.6,sy-s*1.2,s*.4,s*1,1);ctx.fill();
        ctx.fillStyle=dk(col,35);ctx.beginPath();ctx.moveTo(sx+s*.55,sy-s*1.2);ctx.lineTo(sx+s*.8,sy-s*1.5);ctx.lineTo(sx+s*1.05,sy-s*1.2);ctx.closePath();ctx.fill()}
    if(pop>=4){ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(sx-s*1,sy-s*1,s*.35,s*.8,1);ctx.fill();
        ctx.fillStyle=dk(col,35);ctx.beginPath();ctx.moveTo(sx-s*1.05,sy-s*1);ctx.lineTo(sx-s*.82,sy-s*1.35);ctx.lineTo(sx-s*.6,sy-s*1);ctx.closePath();ctx.fill()}
    // Windows
    ctx.fillStyle='rgba(255,220,100,.55)';
    ctx.fillRect(sx-s*.3,sy-s*.55,s*.18,s*.18);ctx.fillRect(sx+s*.12,sy-s*.55,s*.18,s*.18);
    // Flag
    ctx.fillStyle='#3a2a1a';ctx.fillRect(sx+s*1.2,sy-s*1.6,1.5,s*1.2);
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(sx+s*1.2+1.5,sy-s*1.6);ctx.lineTo(sx+s*1.2+s*.5,sy-s*1.35);ctx.lineTo(sx+s*1.2+1.5,sy-s*1.1);ctx.closePath();ctx.fill();
    ctx.restore();
    // Name label
    ctx.font="bold 10px 'Inter',sans-serif";ctx.textAlign='center';ctx.textBaseline='top';

// ======== MINIMAP ========
const MP={grass:'#6aa83c',plains:'#dabe52',forest:'#37732a',hills:'#af7841',mountain:'#8c919e',desert:'#e1cd94',water:'#2a5f9b',coast:'#4887af'};
function drawMini(){if(!state)return;miniX.fillStyle='#060a14';miniX.fillRect(0,0,200,150);const sc=Math.min(200/state.width,150/state.height);for(const k in state.tiles){const[q,r]=k.split(',').map(Number);miniX.fillStyle=MP[state.tiles[k]]||'#333';miniX.fillRect(q*sc,r*sc,Math.max(2,sc),Math.max(2,sc))}for(const c of state.cities){miniX.fillStyle=state.players.find(p=>p.id===c.player)?.color||'#888';miniX.fillRect(c.q*sc-1,c.r*sc-1,4,4)}const vl=(camX/camZoom)/(S3*S)*sc,vt=(camY/camZoom)/(1.5*S)*sc,vw=(canvas.width/camZoom)/(S3*S)*sc,vh=(canvas.height/camZoom)/(1.5*S)*sc;miniX.strokeStyle='rgba(255,215,0,.6)';miniX.lineWidth=1.5;miniX.strokeRect(vl,vt,vw,vh)}
miniC.onclick=e=>{const r=miniC.getBoundingClientRect(),sc=Math.min(200/state.width,150/state.height),[px,py]=h2p(Math.round((e.clientX-r.left)/sc),Math.round((e.clientY-r.top)/sc));camX=px*camZoom-canvas.width/2;camY=py*camZoom-canvas.height/2};
document.getElementById('city-name-input').onkeydown=e=>{if(e.key==='Enter')confirmFoundCity();if(e.key==='Escape')closeCityDialog()};
</script>
</body>
