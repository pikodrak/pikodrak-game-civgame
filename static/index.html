<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<title>CivGame</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1408;color:#e0e0e0;font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh}
#menu-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;position:relative;overflow:hidden}
#menu-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#menu-screen h1{font-family:'Cinzel',serif;font-size:5rem;font-weight:700;background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem;letter-spacing:8px;z-index:1}
#menu-screen .subtitle{font-family:'Cinzel',serif;color:#8090b0;font-size:1.1rem;margin-bottom:2.5rem;letter-spacing:6px;text-transform:uppercase;z-index:1}
.menu-panel{background:rgba(15,20,40,.85);border:1px solid rgba(255,215,0,.15);border-radius:16px;padding:2rem 2.5rem;width:440px;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:10;position:relative}
.menu-panel label{display:block;margin-bottom:.3rem;color:#8090b0;font-size:.85rem;font-weight:500;text-transform:uppercase;letter-spacing:1px}
.menu-panel select{width:100%;padding:.65rem;margin-bottom:1.1rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e0e0e0;font-size:.95rem;font-family:inherit}
.menu-panel select:focus{outline:none;border-color:rgba(255,215,0,.4)}
.menu-panel select option{background:#0a0e1a}
.btn{display:inline-block;padding:.85rem 2rem;border:none;border-radius:10px;font-size:1.05rem;cursor:pointer;transition:all .25s;font-weight:600;font-family:'Cinzel',serif;letter-spacing:2px}
.btn-primary{background:linear-gradient(135deg,#c8960c,#ffd700,#c8960c);color:#1a1000;width:100%;margin-top:.5rem;box-shadow:0 4px 20px rgba(255,215,0,.2)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,215,0,.35)}
.btn-secondary{background:rgba(255,255,255,.06);color:#8090b0;border:1px solid rgba(255,255,255,.1);width:100%;margin-top:.5rem;font-family:'Inter',sans-serif;font-size:.9rem;letter-spacing:1px}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
#game-screen{display:none;height:100vh}
#top-bar{height:48px;background:linear-gradient(180deg,rgba(30,22,10,.98),rgba(20,15,6,.99));border-bottom:2px solid rgba(200,150,0,.25);display:flex;align-items:center;padding:0 .8rem;gap:.6rem;font-size:.85rem;z-index:10}
.resource-item{display:flex;align-items:center;gap:.3rem;padding:.25rem .5rem;background:rgba(255,255,255,.05);border-radius:5px;border:1px solid rgba(255,255,255,.08)}
.resource-icon{font-size:.95rem}.resource-val{font-weight:700;color:#fff;font-size:.88rem;min-width:24px;text-align:right}
.resource-label{font-size:.65rem;color:#6a7a9a;text-transform:uppercase;letter-spacing:.5px}
#turn-info{margin-left:auto;color:#a0a8c0;font-family:'Cinzel',serif;font-size:.9rem;white-space:nowrap}
.top-btn{padding:.35rem .7rem;border:1px solid;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:500;transition:all .15s;background:transparent;font-family:inherit;white-space:nowrap}
#btn-end-turn{padding:.4rem 1.1rem;background:linear-gradient(135deg,#c8960c,#ffd700);color:#1a1000;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:.85rem;font-family:'Cinzel',serif;letter-spacing:1px}
#game-area{display:flex;height:calc(100vh - 48px)}
#map-container{flex:1;position:relative;overflow:hidden;background:#0a1520}
#game-canvas{position:absolute;top:0;left:0;cursor:grab}#game-canvas:active{cursor:grabbing}
#minimap-container{position:absolute;bottom:10px;left:10px;border:2px solid rgba(200,150,0,.25);border-radius:6px;background:rgba(0,0,0,.75);z-index:5;overflow:hidden}
#minimap{display:block}
#right-panel{width:300px;background:linear-gradient(180deg,rgba(30,22,10,.98),rgba(20,15,6,.99));border-left:2px solid rgba(200,150,0,.15);overflow-y:auto;padding:.6rem;font-size:.82rem}
.panel-section{background:rgba(255,220,150,.04);border:1px solid rgba(200,150,0,.12);border-radius:8px;padding:.7rem;margin-bottom:.5rem}
.panel-section h3{font-family:'Cinzel',serif;color:#e8c040;font-size:.88rem;margin-bottom:.4rem;border-bottom:1px solid rgba(200,150,0,.2);padding-bottom:.35rem}
.info-row{display:flex;justify-content:space-between;padding:.2rem 0;align-items:center}.info-label{color:#7888b0;font-size:.8rem}.info-value{color:#e0e8ff;font-weight:600;font-size:.85rem}
.prod-list{max-height:300px;overflow-y:auto}
.prod-item{padding:.5rem .6rem;margin:.2rem 0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:6px;cursor:pointer;transition:all .12s}
.prod-item:hover{background:rgba(200,150,0,.12);border-color:rgba(200,150,0,.35);transform:translateX(3px)}
.prod-name{font-weight:600;color:#d8e0f0;font-size:.84rem}.prod-stats{font-size:.75rem;color:#6878a8;margin-top:.1rem}
.action-btn{padding:.35rem .65rem;margin:.15rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#c8d0e8;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .12s}
.action-btn:hover{background:rgba(200,150,0,.15);border-color:rgba(200,150,0,.4);color:#fff}
#events-log{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
.event-msg{background:rgba(5,10,25,.92);padding:.5rem 1.2rem;border-radius:8px;font-size:.85rem;color:#ffd700;border:1px solid rgba(255,215,0,.2);animation:fadeUp 4s forwards;pointer-events:none}
@keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}10%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:linear-gradient(135deg,#1e1508,#2a1c0c);border:1px solid rgba(255,195,0,.2);border-radius:16px;padding:1.5rem 2rem;max-width:750px;max-height:82vh;overflow-y:auto;width:92%}
.modal h2{font-family:'Cinzel',serif;color:#ffd700;margin-bottom:1.2rem;font-size:1.4rem}
.modal .close-btn{float:right;background:none;border:none;color:#5060a0;font-size:1.6rem;cursor:pointer}
.tech-era{margin-bottom:1.2rem}.tech-era h4{font-family:'Cinzel',serif;color:#6090c0;margin-bottom:.5rem}
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.5rem}
.tech-card{padding:.65rem;background:rgba(255,220,150,.03);border:1px solid rgba(255,195,0,.1);border-radius:8px;cursor:pointer;transition:all .2s}
.tech-card:hover{border-color:rgba(100,150,220,.4)}.tech-card.researched{border-color:rgba(46,204,113,.4);background:rgba(46,204,113,.06)}.tech-card.current{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06)}.tech-card.unavailable{opacity:.35;cursor:not-allowed}
.tech-card .tech-name{font-weight:600;font-size:.88rem;color:#c0c8e0}.tech-card .tech-cost{font-size:.78rem;color:#5060a0}.tech-card .tech-unlocks{font-size:.73rem;color:#4080c0;margin-top:.2rem}
.diplo-player{display:flex;align-items:center;gap:.8rem;padding:.7rem;margin:.4rem 0;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px}
.diplo-color{width:24px;height:24px;border-radius:50%}.diplo-status{margin-left:auto;font-size:.85rem;font-weight:600}
.diplo-status.war{color:#e74c3c}.diplo-status.peace{color:#2ecc71}.diplo-status.neutral{color:#f1c40f}
.diplo-btn{padding:.35rem .65rem;border:1px solid;border-radius:6px;background:none;cursor:pointer;font-size:.8rem;margin-left:.3rem;font-family:inherit}
#game-over-screen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,10,4,.94);z-index:200;align-items:center;justify-content:center;flex-direction:column}
#game-over-screen.active{display:flex}#game-over-screen h1{font-family:'Cinzel',serif;font-size:4rem;margin-bottom:1rem}
#game-over-screen .victory{color:#ffd700}#game-over-screen .defeat{color:#e74c3c}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,215,0,.15);border-radius:3px}
#city-name-dialog{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;background:linear-gradient(135deg,#1e1508,#2a1c0c);border:2px solid rgba(255,195,0,.3);border-radius:16px;padding:2rem;text-align:center}
#city-name-dialog h3{font-family:'Cinzel',serif;color:#ffd700;margin-bottom:1.2rem}
#city-name-dialog input{padding:.6rem;width:220px;background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.2);border-radius:8px;color:#fff;font-size:1rem;text-align:center;font-family:inherit}
.save-item{padding:.7rem;margin:.3rem 0;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.save-item:hover{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.2)}
.hp-bar-bg{background:rgba(255,255,255,.1);border-radius:3px;height:4px;margin-top:.3rem;overflow:hidden}.hp-bar-fill{height:100%;border-radius:3px}
.progress-bar-bg{background:rgba(255,255,255,.08);border-radius:4px;height:6px;margin-top:.3rem;overflow:hidden}.progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#c8960c,#ffd700)}
#game-dialog{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center}
#game-dialog.active{display:flex}
#game-dialog .dlg-box{background:linear-gradient(135deg,#1e1610,#2a1e12);border:2px solid rgba(200,150,0,.3);border-radius:12px;padding:1.5rem;min-width:320px;max-width:460px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
#game-dialog .dlg-title{font-family:'Cinzel',serif;color:#ffd700;font-size:1.1rem;margin-bottom:.8rem}
#game-dialog .dlg-msg{color:#c0c8e0;font-size:.9rem;line-height:1.5;margin-bottom:1rem}
#game-dialog .dlg-input{width:100%;padding:.5rem;margin-bottom:.8rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#e0e0e0;font-size:.9rem}
#game-dialog .dlg-btns{display:flex;gap:.5rem;justify-content:flex-end}
#game-dialog .dlg-btn{padding:.5rem 1.2rem;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#c0c8e0;cursor:pointer;font-size:.85rem;transition:all .15s}
#game-dialog .dlg-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,215,0,.3)}
#game-dialog .dlg-btn.primary{background:linear-gradient(135deg,#c8960c,#ffd700);color:#1a1408;font-weight:600;border:none}
#game-dialog .dlg-btn.primary:hover{filter:brightness(1.1)}
#game-dialog .dlg-btn.danger{color:#e74c3c;border-color:rgba(231,76,60,.3)}
#game-dialog .dlg-btn.danger:hover{background:rgba(231,76,60,.15)}
</style>
</head>
<body>
<div id="game-dialog"><div class="dlg-box"><div class="dlg-title" id="dlg-title"></div><div class="dlg-msg" id="dlg-msg"></div><input class="dlg-input" id="dlg-input" style="display:none"><div class="dlg-btns" id="dlg-btns"></div></div></div>
<div id="login-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#1a1408">
<h1 style="font-family:'Cinzel',serif;font-size:4rem;background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem">CIVGAME</h1>
<div class="menu-panel" style="width:340px">
<div id="login-form">
<label data-t="username">Username</label><input id="auth-user" type="text" style="width:100%;padding:.6rem;margin-bottom:.6rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e0e0e0;font-size:1rem">
<label data-t="password">Password</label><input id="auth-pass" type="password" style="width:100%;padding:.6rem;margin-bottom:.8rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e0e0e0;font-size:1rem">
<button class="btn btn-primary" onclick="doLogin()" data-t="login">Login</button>
<button class="btn btn-secondary" onclick="doRegister()" data-t="register">Register</button>
<button class="btn btn-secondary" onclick="playAsGuest()" style="margin-top:.3rem;color:#888" data-t="play_guest">Play as Guest</button>
<div id="auth-error" style="color:#e74c3c;font-size:.85rem;margin-top:.5rem;text-align:center"></div>
</div>
</div>
</div>
<div id="menu-screen" style="display:none"><canvas id="menu-bg"></canvas><h1>CIVGAME</h1><p class="subtitle" data-t="turn_based">Turn-Based Strategy</p><p id="menu-version" style="font-size:.7rem;color:#556;margin-top:-.5rem;margin-bottom:.5rem"></p>
<div class="menu-panel" style="position:relative"><div id="user-info" style="position:absolute;top:-30px;right:0;font-size:.75rem;color:#8090b0"></div>
<button class="btn btn-primary" onclick="openSetupScreen()" style="width:100%;padding:.8rem;font-size:1.1rem" data-t="new_game">New Game</button>
<button class="btn btn-secondary" onclick="openLoadDialog()" style="margin-top:.4rem" data-t="load_game">Load Game</button>
<button class="btn btn-secondary" onclick="openAccount()" id="btn-account" style="margin-top:.3rem;color:#60a0ff;border-color:rgba(96,160,255,.3)" data-t="profile">Profile</button>
<button class="btn btn-secondary" onclick="openHowToPlay()" style="margin-top:.3rem;color:#60c080;border-color:rgba(96,192,128,.3)" data-t="how_to_play">How to Play</button>
</div></div>
<div class="modal-overlay" id="setup-modal"><div class="modal" style="max-width:700px;max-height:90vh;overflow-y:auto"><button class="close-btn" onclick="closeSetup()">&times;</button><h2 style="color:#ffd700" data-t="new_game">New Game</h2><div id="setup-content"></div></div></div>
<div id="game-screen"><div id="top-bar">
<div class="resource-item"><span class="resource-icon" style="color:#ffd700">&#9733;</span><div><span class="resource-val" id="res-gold">0</span><div class="resource-label" data-t="gold">Gold</div></div></div>
<div class="resource-item"><span class="resource-icon" style="color:#60a0ff">&#9881;</span><div><span class="resource-val" id="res-science">--</span><div class="resource-label" data-t="science">Science</div></div></div>
<div class="resource-item"><span class="resource-icon" style="color:#c490ff">&#9829;</span><div><span class="resource-val" id="res-culture">0</span><div class="resource-label" data-t="culture">Culture</div></div></div>
<div class="resource-item"><span class="resource-icon" style="color:#ff6060">&#9876;</span><div><span class="resource-val" id="res-military">0</span><div class="resource-label" data-t="army">Army</div></div></div>
<div style="display:flex;gap:4px">
<button class="top-btn" style="color:#60a0ff;border-color:rgba(96,160,255,.3)" onclick="openTechTree()" data-t="research">Research</button>
<button class="top-btn" style="color:#c490ff;border-color:rgba(196,144,255,.3)" onclick="openDiplomacy()" data-t="diplomacy">Diplomacy</button>
<button class="top-btn" style="color:#60c080;border-color:rgba(96,192,128,.3)" onclick="saveGame()" data-t="save">Save</button>
<button class="top-btn" style="color:#e07050;border-color:rgba(224,112,80,.3)" onclick="quitGame()" data-t="quit">Quit</button>
<button class="top-btn" style="color:#888;border-color:rgba(136,136,136,.3);font-size:.7rem" onclick="logout()" data-t="logout">Logout</button>
</div>
<span id="last-produced" style="font-size:.7rem;color:#60c080;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><span id="turn-info">Turn 1</span><span id="game-version" style="font-size:.6rem;color:#556;margin-left:4px"></span><button id="btn-end-turn" onclick="endTurn()" data-t="end_turn">End Turn</button>
</div><div id="game-area"><div id="map-container"><canvas id="game-canvas"></canvas><div id="minimap-container"><canvas id="minimap" width="200" height="150"></canvas></div><div id="events-log"></div></div>
<div id="right-panel"><div id="panel-content"><div class="panel-section"><h3>Welcome</h3><p style="color:#4060a0">Click a unit or city</p></div></div></div></div></div>
<div id="city-name-dialog"><h3>Found New City</h3><input type="text" id="city-name-input" maxlength="20"><br><button class="btn btn-primary" onclick="confirmFoundCity()" style="width:auto;padding:.6rem 2rem">Found</button><button class="action-btn" onclick="closeCityDialog()" style="margin-left:.5rem">Cancel</button></div>
<div class="modal-overlay" id="tech-modal"><div class="modal"><button class="close-btn" onclick="closeTechTree()">&times;</button><h2>Technology Tree</h2><div id="tech-tree-content"></div></div></div>
<div class="modal-overlay" id="diplo-modal"><div class="modal"><button class="close-btn" onclick="closeDiplomacy()">&times;</button><h2>Diplomacy</h2><div id="diplo-content"></div></div></div>
<div class="modal-overlay" id="account-modal"><div class="modal" style="max-width:600px;max-height:90vh;overflow-y:auto"><button class="close-btn" onclick="closeAccount()">&times;</button><h2>Profile</h2><div id="account-content"></div></div></div>
<div class="modal-overlay" id="prod-modal"><div class="modal" style="max-width:500px"><button class="close-btn" onclick="closeProdModal()">&times;</button><h2 id="prod-modal-title">Build</h2><div id="prod-modal-content"></div></div></div>
<div class="modal-overlay" id="load-modal"><div class="modal"><button class="close-btn" onclick="closeLoadDialog()">&times;</button><h2>Load Game</h2><div id="load-content"></div></div></div>
<div id="game-over-screen"><h1 id="game-over-title"></h1><p id="game-over-msg" style="font-size:1.2rem;margin-bottom:2rem;color:#8090b0"></p><button class="btn btn-primary" onclick="location.reload()" style="width:auto">Play Again</button></div>

// Detect language: saved preference > browser > fallback to 'en'
let _lang=localStorage.getItem('civgame_lang')||navigator.language?.substring(0,2)||'en';
if(!LANG[_lang])_lang='en';
function _t(key){return LANG[_lang]?.[key]||LANG.en[key]||key}
function setLang(lang){_lang=lang;localStorage.setItem('civgame_lang',lang);location.reload()}
function applyLang(){document.querySelectorAll('[data-t]').forEach(el=>{const k=el.getAttribute('data-t');if(k)el.textContent=_t(k)})}
// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r||0,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();return this}}
window.onerror=function(m,s,l){document.title='ERR: '+m;console.error(m,s,l)};

// ======== AUTH ========
let authToken=localStorage.getItem('civgame_token');
let currentUser=null;

async function authApi(path,method='GET',body=null){
    const o={method,headers:{'Content-Type':'application/json'}};
    if(body)o.body=JSON.stringify(body);
    if(authToken)o.headers['Authorization']='Bearer '+authToken;
    return(await fetch(path,o)).json();
}

// Override api to include auth token
const _origApi=async function(p,m='GET',b=null){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);if(authToken)o.headers['Authorization']='Bearer '+authToken;return(await fetch(p,o)).json()};

async function doLogin(){
    const u=document.getElementById('auth-user').value,p=document.getElementById('auth-pass').value;
    const err=document.getElementById('auth-error');
    try{const r=await authApi('/api/auth/login','POST',{username:u,password:p});
        if(r.ok){authToken=r.token;currentUser=r.user;localStorage.setItem('civgame_token',r.token);showMenu()}
        else err.textContent=r.detail||'Login failed'}
    catch(e){err.textContent='Login failed'}}

async function doRegister(){
    const u=document.getElementById('auth-user').value,p=document.getElementById('auth-pass').value;
    const err=document.getElementById('auth-error');
    try{const r=await authApi('/api/auth/register','POST',{username:u,password:p});
        if(r.ok){authToken=r.token;currentUser=r.user;localStorage.setItem('civgame_token',r.token);showMenu()}
        else err.textContent=r.detail||'Registration failed'}
    catch(e){err.textContent='Registration failed'}}

function playAsGuest(){authToken=null;currentUser=null;localStorage.removeItem('civgame_token');showMenu()}

async function showMenu(){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('menu-screen').style.display='flex';
    const ui=document.getElementById('user-info');
    const ab=document.getElementById('btn-account');
    if(currentUser){ui.textContent=`Logged in as ${currentUser.username}`;if(ab)ab.style.display=''}
    else{ui.textContent='Playing as guest';if(ab)ab.style.display='none'}
    // Load version info
    try{const vi=await fetch('/api/version').then(r=>r.json());
        const mv=document.getElementById('menu-version');
        if(mv)mv.textContent=`v${vi.version} (${vi.build})`;
        const gv=document.getElementById('game-version');
        if(gv)gv.textContent=`v${vi.version}`;
        window._gameVersion=vi;
    }catch(e){}
    // Try auto-load last game
    if(await tryAutoLoad()){
        for(const k in tileCache)delete tileCache[k];
        document.getElementById('menu-screen').style.display='none';
        document.getElementById('game-screen').style.display='block';
        setTimeout(()=>{initCanvas();centerOn();requestAnimationFrame(loop);updateUI();selectNextUnit();drawMini();showEvent('Game restored')},50)}
}

function logout(){authToken=null;currentUser=null;localStorage.removeItem('civgame_token');location.reload()}

async function openAccount(){
    if(!currentUser){showEvent('Login required');return}
    let h=`<div class="panel-section"><h3 style="color:#ffd700">${_t('profile')}</h3>
    <div style="display:grid;grid-template-columns:100px 1fr;gap:.4rem;font-size:.85rem">
    <span style="color:#8090b0">${_t('username')}</span><span style="color:#e0e0e0">${currentUser.username}</span>
    <span style="color:#8090b0">${_t('language')}</span>
    <select onchange="setLang(this.value)" style="padding:.3rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:4px;color:#e0e0e0;font-size:.82rem">
    <option value="en" ${_lang==='en'?'selected':''}>English</option>
    <option value="cs" ${_lang==='cs'?'selected':''}>Cestina</option></select>
    </div></div>`;

    // API Tokens
    try{
        const tokens=await api('/api/auth/tokens');
        h+=`<div class="panel-section"><h3>API Tokens (${tokens.length})</h3>`;
        h+=`<p style="font-size:.75rem;color:#6a7a9a;margin-bottom:.5rem">Connect AI bots via REST API</p>`;
        for(const t of tokens){
            const used=t.last_used?new Date(t.last_used*1000).toLocaleString():'Never';
            h+=`<div style="padding:.4rem;margin:.2rem 0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;display:flex;justify-content:space-between;align-items:center">
                <div><b style="color:#c0c8e0;font-size:.85rem">${t.name}</b>
                <div style="font-size:.7rem;color:#5a6a8a">Token: <code style="color:#ffd700;cursor:pointer" onclick="navigator.clipboard.writeText('${t.token_full}');this.textContent='Copied!'">${t.token}</code> | Last: ${used}</div></div>
                ${t.active?`<button class="action-btn" style="color:#e74c3c;font-size:.75rem" onclick="revokeToken(${t.id})">Revoke</button>`:'<span style="color:#888;font-size:.75rem">Revoked</span>'}
            </div>`;
        }
        h+=`<button class="action-btn" style="margin-top:.5rem" onclick="createToken()">+ New API Token</button>`;
        h+='</div>';
    }catch(e){}

    // Admin: spectator
    if(currentUser&&currentUser.username==='pikodrak'){
        h+=`<div class="panel-section"><h3>Admin</h3>
        <button class="action-btn" onclick="openSpectator()">View Active Games</button></div>`}

    // Version
    const vi=window._gameVersion;
    if(vi){h+=`<div class="panel-section"><h3>Version ${vi.version}</h3><p style="font-size:.75rem;color:#6a7a9a">Build: ${vi.build}</p></div>`}

    h+=`<button class="btn btn-secondary" onclick="logout()" style="color:#e74c3c;border-color:rgba(224,80,80,.3);margin-top:.5rem">Logout</button>`;

    document.getElementById('account-content').innerHTML=h;
    document.getElementById('account-modal').classList.add('active');
}
function closeAccount(){document.getElementById('account-modal').classList.remove('active')}

<h3 style="color:#ffd700;margin:.8rem 0 .3rem">Combat</h3>
<p><b>Melee:</b> Move onto enemy hex to attack. Both attacker and defender take damage.<br>
<b>Ranged:</b> Press <kbd>R</kbd>, click target within range. Attacker takes only 25% return fire. Cannot capture cities.<br>
<b>City siege:</b> Attack city to reduce HP. When city HP = 0, melee unit captures it. Ranged can soften but not capture.<br>
<b>Fortify</b> (<kbd>F</kbd>): +25% defense bonus. Heals +10 HP/turn.<br>
<b>Terrain defense:</b> Forest +25%, Hills +50%, Desert -10%.<br>
<b>Healing:</b> In own city +15 HP/turn, fortified +10, field +5.<br>
<b>Trait bonuses:</b> Aggressive leaders +15% attack, Protective +15% defense near own cities.</p>

<h3 style="color:#ffd700;margin:.8rem 0 .3rem">Diplomacy</h3>
<p><b>Peace</b> \u2014 Default. Cannot enter each other's territory.<br>
<b>War</b> \u2014 Triggered by entering territory, attacking, or declaration. Minimum 10 turns.<br>
<b>Alliance</b> \u2014 Free passage through territory. If ally is attacked, you automatically join war. Max 2 alliances.<br>
<b>Peace treaty</b> \u2014 After making peace, 15-turn cooldown before can declare war again.<br>
<b>Territory:</b> Entering foreign territory without alliance = war. Culture pressure can take enemy tiles.<br>
<b>Relations:</b> -100 to +100. City near border = -30 provocation. Drift toward 0 over time.</p>

<h3 style="color:#ffd700;margin:.8rem 0 .3rem">Economy</h3>
<p><b>Gold income:</b> Sum of city gold yields + trade route bonuses.<br>
<b>Trade routes:</b> Cities connected to capital by road earn +1 gold per 2 population (min 1).<br>
<b>Unit maintenance:</b> 2 gold per unit above 2 free units.<br>
<b>Bankruptcy (gold &lt; -50):</b> Military units disbanded (weakest first). If none left, cheapest building sold.<br>
<b>Science:</b> Population + building bonuses. Advances tech research.<br>
<b>Culture:</b> Base 1 + building bonuses. Expands borders at thresholds (10/50/150/400). Counts toward culture victory.</p>

<h3 style="color:#ffd700;margin:.8rem 0 .3rem">Map Options</h3>
<p><b>Random:</b> Procedurally generated continents with varied terrain.<br>
<b>Earth:</b> Real-world continent shapes (small/medium/large). Includes major mountain ranges (Rockies, Andes, Alps, Himalayas), Sahara desert, latitude-based biomes.<br>
<b>Globe (wrap-around):</b> Left edge connects to right edge, creating a round world. Earth maps always use globe mode.</p>

<h3 style="color:#ffd700;margin:.8rem 0 .3rem">Strategy Tips</h3>
<p>1. <b>Early game:</b> Research agriculture \u2192 build granary \u2192 build farms. Food is king early.<br>
2. <b>Workers first:</b> Build 1 worker per city. They pay for themselves quickly with tile improvements.<br>
3. <b>Roads matter:</b> Connect cities to capital for trade gold. Build roads before armies.<br>
4. <b>Don\u2019t over-expand:</b> Each city needs food for its military units. Too many units = starvation.<br>
5. <b>Happiness:</b> Build colosseum/temple/stadium before growing past pop 4. Unhappy cities are crippled.<br>
6. <b>Settlers cost pop:</b> Only build settlers from cities with 3+ population.<br>
7. <b>Defense:</b> Walls (+50 def) and castle (+80 def) make cities very hard to take. Fortified units get +25%.<br>
8. <b>Tech beeline:</b> Choose a victory path early. Space = rush science techs. Culture = temples/museums. Domination = military techs.<br>
9. <b>Ranged is powerful:</b> Archers/catapults can damage without taking full return fire. Soften enemies before melee charge.<br>
10. <b>Diplomacy:</b> Don\u2019t enter foreign territory by accident \u2014 it triggers war! Use alliances for free passage.</p>

    },3000);

function h2p(q,r){return[S3*S*(q+.5*(r&1)),1.5*S*r]}
function p2h(sx,sy){const mx=(sx+camX)/camZoom,my=(sy+camY)/camZoom;let bq=0,br=0,bd=1e9;const ar=Math.round(my/(1.5*S)),aq=Math.round((mx-.5*(ar&1)*S3*S)/(S3*S));for(let dr=-2;dr<=2;dr++)for(let dq=-2;dq<=2;dq++){const[hx,hy]=h2p(aq+dq,ar+dr),d=(hx-mx)**2+(hy-my)**2;if(d<bd){bd=d;bq=aq+dq;br=ar+dr}}return[bq,br]}
function hNb(q,r){return r&1?[[q,r-1],[q+1,r-1],[q+1,r],[q,r+1],[q+1,r+1],[q-1,r]]:[[q-1,r-1],[q,r-1],[q+1,r],[q,r+1],[q-1,r+1],[q-1,r]]}
function hD(a,b,c,d){const f=(q,r)=>{const x=q-(r-(r&1))/2;return[x,-x-r,r]};const[x1,y1,z1]=f(a,b),[x2,y2,z2]=f(c,d);return Math.max(Math.abs(x1-x2),Math.abs(y1-y2),Math.abs(z1-z2))}
function hexP(c,x,y,s){c.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2,px=x+s*Math.cos(a),py=y+s*Math.sin(a);i?c.lineTo(px,py):c.moveTo(px,py)}c.closePath()}
function Hf(a,b){let h=(a*374761393+b*668265263+a*b*131)^0x5bf03635;h=((h>>13)^h)*1274126177;return((h>>16)^h&0x7fffffff)/0x7fffffff}

function closeSetup(){document.getElementById('setup-modal').classList.remove('active')}

let _selectedCiv='rome';
function selectCiv(k){
_selectedCiv=k;
// Highlight selected
document.querySelectorAll('#civ-list .prod-item').forEach(el=>el.style.borderColor='transparent');
const el=document.getElementById('civ-'+k);
if(el)el.style.borderColor='#ffd700';
// Show detail
const v=CIV_DATA[k];if(!v)return;
document.getElementById('civ-detail').innerHTML=`
<div style="display:flex;align-items:center;gap:8px;margin-bottom:.4rem">
<div style="width:20px;height:20px;border-radius:50%;background:${v.color}"></div>
<h3 style="margin:0;padding:0;border:0;color:#ffd700">${v.name}</h3></div>
<div style="font-size:.82rem;color:#c0c8e0;margin-bottom:.3rem">${_t('leader')}: <b>${v.leader}</b></div>
<div style="font-size:.78rem;color:#a0b0c0;display:grid;grid-template-columns:1fr 1fr;gap:.2rem">
<div>${_t('trait')}: <span style="color:#60c080">${v.trait}</span></div>
<div>${_t('bonus')}: <span style="color:#ffd700">+${v.bonus}</span></div>
<div>${_t('strategy')}: <span style="color:#60a0ff">${v.strategy}</span></div>
</div>`;

function onMapTypeChange(){
const mt=document.getElementById('setup-maptype').value;
const ms=document.getElementById('setup-mapsize');
if(mt==='earth_s'){ms.value='40,30';ms.disabled=true}
else if(mt==='earth_m'){ms.value='55,40';ms.disabled=true}
else if(mt==='earth_l'){ms.value='80,55';ms.disabled=true}
else{ms.disabled=false}
}

async function launchGame(){
    closeSetup();
    const c=_selectedCiv;
    const mt=document.getElementById('setup-maptype').value;
    const ms=document.getElementById('setup-mapsize').value;
    const[w,h]=ms.split(',').map(Number);
    const n=+document.getElementById('setup-opponents').value;
    const wrap=document.getElementById('setup-wrap').checked;
    try{
    const d=await api('/api/new_game','POST',{width:w,height:h,num_players:n,civ:c,map_type:mt,wrap});
    gameId=d.game_id;state=d.state;for(const k in tileCache)delete tileCache[k];
    document.getElementById('menu-screen').style.display='none';
    document.getElementById('game-screen').style.display='block';
    setTimeout(()=>{initCanvas();centerOn();requestAnimationFrame(loop);updateUI();selectNextUnit();drawMini();autoSave()},50);
    }catch(e){gameAlert('Error',e.message);console.error(e)}
}
// Keep old startGame as fallback
async function startGame(){openSetupScreen()}
function quitGame(){openSaveDialog('quit')}
function openSaveDialog(mode){
const m=document.getElementById('prod-modal');const t=document.getElementById('prod-modal-title');const c=document.getElementById('prod-modal-content');
t.textContent=mode==='quit'?_t('save_quit'):_t('save_game');
const defName=state?`${_t('turn')} ${state.turn}`:'Save';
c.innerHTML=`<div style="padding:.5rem">
<label style="font-size:.85rem;color:#a0b0c0">${_t('save_name')}</label>
<input id="save-name-input" type="text" value="${defName}" style="width:100%;padding:.5rem;margin:.4rem 0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#e0e0e0;font-size:.9rem">
<div style="display:flex;gap:.5rem;margin-top:.8rem">
<button class="btn btn-primary" style="flex:1;padding:.6rem" onclick="doSave('${mode}')">${mode==='quit'?_t('save_quit'):_t('save')}</button>
${mode==='quit'?`<button class="action-btn" style="flex:1;padding:.6rem;color:#e74c3c" onclick="doQuitNoSave()">${_t('quit_no_save')}</button>`:''}
<button class="action-btn" style="padding:.6rem" onclick="closeProdModal()">${_t('cancel')}</button>
</div></div>`;
m.classList.add('active');
setTimeout(()=>{const inp=document.getElementById('save-name-input');if(inp){inp.focus();inp.select()}},100)}
async function doSave(mode){
const name=document.getElementById('save-name-input')?.value||'Save';
closeProdModal();
if(currentUser){const d=await api('/api/user/save','POST',{name});if(d.ok)showEvent('Saved: '+name);else showEvent('Save failed')}
else{const d=await api(`/api/game/${gameId}/save`,'POST');if(d.ok)showEvent('Saved')}
if(mode==='quit'){gameId=null;state=null;selectedUnit=selectedCity=null;document.getElementById('game-screen').style.display='none';document.getElementById('menu-screen').style.display='flex'}}
function doQuitNoSave(){closeProdModal();gameId=null;state=null;selectedUnit=selectedCity=null;document.getElementById('game-screen').style.display='none';document.getElementById('menu-screen').style.display='flex'}
let holdTimer=null,isHold=false;
window._pendingGoto=null; // {uid,q,r,path} — preview awaiting confirmation
async function previewGoto(uid,q,r){
    try{const d=await api(`/api/game/${gameId}/path_preview`,'POST',{unit_id:uid,q,r});
    if(d.ok&&d.path&&d.path.length>0){window._pendingGoto={uid,q,r,path:d.path,turns:d.turns||d.path.length};showEvent('Goto preview — click again to confirm')}
    else{window._pendingGoto=null;showEvent('No path')}}
    catch(err){window._pendingGoto=null}
}
function initCanvas(){const c=document.getElementById('map-container');canvas.width=c.clientWidth;canvas.height=c.clientHeight;
canvas.onmousedown=e=>{isDragging=true;isHold=false;dragStartX=e.clientX;dragStartY=e.clientY;dragCamX=camX;dragCamY=camY;
    // Start hold timer for goto preview
    if(selectedUnit&&e.button===0){holdTimer=setTimeout(()=>{isHold=true;const r=canvas.getBoundingClientRect();const[q,r2]=p2h(e.clientX-r.left,e.clientY-r.top);if(selectedUnit&&state.tiles[`${q},${r2}`]){const u=state.units.find(u=>u.id===selectedUnit);if(u&&!(u.q===q&&u.r===r2)){previewGoto(selectedUnit,q,r2)}}},400)}};
canvas.onmousemove=e=>{if(isDragging){const dx=Math.abs(e.clientX-dragStartX),dy=Math.abs(e.clientY-dragStartY);if(dx>5||dy>5){clearTimeout(holdTimer);holdTimer=null}camX=dragCamX-(e.clientX-dragStartX);camY=dragCamY-(e.clientY-dragStartY)}};
canvas.onmouseup=e=>{clearTimeout(holdTimer);holdTimer=null;if(!isHold&&Math.abs(e.clientX-dragStartX)<5&&Math.abs(e.clientY-dragStartY)<5){const r=canvas.getBoundingClientRect();handleClick(...p2h(e.clientX-r.left,e.clientY-r.top),e.button===2)}isDragging=false;isHold=false};
canvas.onwheel=e=>{e.preventDefault();const o=camZoom;camZoom=Math.max(.3,Math.min(3,camZoom*(e.deltaY>0?.9:1.1)));const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;camX=(camX+mx)*(camZoom/o)-mx;camY=(camY+my)*(camZoom/o)-my};canvas.oncontextmenu=e=>e.preventDefault();document.onkeydown=onKey;onresize=()=>{canvas.width=document.getElementById('map-container').clientWidth;canvas.height=document.getElementById('map-container').clientHeight}}
function centerOn(){const u=state.units.find(u=>u.player===0)||state.cities.find(c=>c.player===0);if(!u)return;const[px,py]=h2p(u.q,u.r);camX=px-canvas.width/2;camY=py-canvas.height/2}
function loop(t){T=t*.001;try{render()}catch(e){console.error('render error:',e);ctx.fillStyle='red';ctx.font='16px sans-serif';ctx.fillText('RENDER ERROR: '+e.message,10,50)}requestAnimationFrame(loop)}
function onKey(e){if(e.key==='Escape'){rangedMode=false;window._pendingGoto=null;selectedUnit=selectedCity=null;closeTechTree();closeDiplomacy();closeLoadDialog();closeCityDialog();closeProdModal();closeAccount();updatePanel()}
if(!selectedUnit){if(e.key===' '&&!isM()){e.preventDefault();spaceAction()}if((e.key==='Enter'||e.key==='e')&&!isM())endTurn();if(e.key==='s'&&e.ctrlKey){e.preventDefault();saveGame()}return}
const su=state.units.find(u=>u.id===selectedUnit);if(!su)return;
const isWorker=su.type==='worker';
// Context-sensitive keys
if(e.key==='f'){if(isWorker)workerBuild('farm');else fortifyUnit()}
if(e.key==='r'){if(isWorker)workerBuild('road');else if(su.cat==='ranged'||su.cat==='siege'||(su.cat==='air'&&su.type==='bomber'))startRangedAttack()}
if(e.key==='a'){if(isWorker)autoWorker();else if(su.cat==='ranged'||su.cat==='siege'||(su.cat==='air'&&su.type==='bomber'))startRangedAttack()}
if(e.key==='m'&&isWorker)workerBuild('mine');
if(e.key==='l'&&isWorker)workerBuild('lumber_mill');
if(e.key==='i'&&isWorker)workerBuild('railroad');
if(e.key==='t'&&isWorker)workerBuild('trading_post');
if(e.key==='x')exploreUnit();
if(e.key==='s'&&!e.ctrlKey)sentryUnit();
if(e.key==='Delete')disbandUnit();
if(e.key==='Tab'){e.preventDefault();cycleNextUnit()}
if(e.key==='b'&&su.type==='settler')openCityDialog();
if(e.key===' '&&!isM()){e.preventDefault();spaceAction()}
if((e.key==='Enter'||e.key==='e')&&!isM())endTurn();
if(e.key==='s'&&e.ctrlKey){e.preventDefault();saveGame()}}
function isM(){return['tech-modal','diplo-modal','load-modal','prod-modal','account-modal'].some(id=>document.getElementById(id).classList.contains('active'))||document.getElementById('city-name-dialog').style.display==='block'}
function handleClick(q,r,right){if(!state)return;
// Pending goto preview: click on same hex confirms, click elsewhere cancels
if(window._pendingGoto&&!right){const p=window._pendingGoto;if(p.uid===selectedUnit&&p.q===q&&p.r===r){window._pendingGoto=null;gotoUnit(p.uid,q,r);return}window._pendingGoto=null}
if(rangedMode&&selectedUnit&&!right){doRangedAttack(q,r);return}if(selectedUnit&&!right){const u=state.units.find(u=>u.id===selectedUnit);if(u){const adj=hNb(u.q,u.r).some(([a,b])=>a===q&&b===r);if(adj&&u.moves_left>0){moveUnit(selectedUnit,q,r);return}}}const cu=state.units.find(u=>u.q===q&&u.r===r&&u.player===0);if(cu){selectedUnit=cu.id;selectedCity=null;updatePanel();return}const cc=state.cities.find(c=>c.q===q&&c.r===r&&c.player===0);if(cc){selectedCity=cc.id;selectedUnit=null;updatePanel();return}selectedUnit=selectedCity=null;updatePanel()}

if(!window._unitAnims)window._unitAnims={};
async function moveUnit(uid,q,r){
// Save old position for animation
const oldU=state.units.find(u=>u.id===uid);
const oldQ=oldU?oldU.q:q,oldR=oldU?oldU.r:r;
const d=await api(`/api/game/${gameId}/move`,'POST',{unit_id:uid,q,r});
if(d.needs_war){if(await gameConfirm(_t('declare_war'),d.msg)){await api(`/api/game/${gameId}/diplomacy`,'POST',{target_player:d.war_target,action:'war'});const d2=await api(`/api/game/${gameId}/move`,'POST',{unit_id:uid,q,r});if(d2.ok){state=d2.state;if(d2.combat)showEvent(d2.msg);
// Animate
const nu=state.units.find(u=>u.id===uid);if(nu&&(nu.q!==oldQ||nu.r!==oldR)){const now=performance.now();window._unitAnims[uid]={fromQ:oldQ,fromR:oldR,toQ:nu.q,toR:nu.r,start:now,end:now+250}}
if(!nu||nu.moves_left<=0){selectedUnit=null;setTimeout(()=>selectNextUnit(),500)}}else showEvent(d2.msg)}updateUI();updatePanel();drawMini();return}
if(d.ok){state=d.state;if(d.combat)showEvent(d.msg);
// Animate movement
const nu=state.units.find(u=>u.id===uid);
if(nu&&(nu.q!==oldQ||nu.r!==oldR)){const now=performance.now();window._unitAnims[uid]={fromQ:oldQ,fromR:oldR,toQ:nu.q,toR:nu.r,start:now,end:now+250}}
updateUI();updatePanel();drawMini();
if(nu)centerOnTile(nu.q,nu.r);
if(!nu||nu.moves_left<=0){setTimeout(()=>{selectedUnit=null;selectNextUnit();updatePanel()},600)}}
else{showEvent(d.msg);updateUI();updatePanel();drawMini()}}
async function endTurn(){
    // Check for units without orders — select first idle one
    if(state){const idle=state.units.filter(u=>u.player===0&&u.moves_left>0&&!u.fortified&&!u.sentry&&!u.exploring&&!u.goto&&!u.building);
    if(idle.length>0){
        selectedUnit=idle[0].id;selectedCity=null;centerOnTile(idle[0].q,idle[0].r);updatePanel();
        showEvent(`${idle.length} unit(s) without orders!`);
        if(!await gameConfirm(_t('units_without_orders'),`${idle.length} ${_t('end_turn_confirm')}`))return}}
    const d=await api(`/api/game/${gameId}/end_turn`,'POST');state=d.state;selectedUnit=selectedCity=null;
    // Show events and detect completed production
    let lastProduced=null;
    if(d.events){for(const e of d.events){showEvent(e);
        if(typeof e==='string'&&(e.includes(' produced ')||e.includes(' built '))){lastProduced=e}}}
    // Show last production in top bar
    if(lastProduced){const lp=document.getElementById('last-produced');if(lp)lp.textContent=lastProduced}
    updateUI();updatePanel();drawMini();autoSave();if(state.game_over){showGameOver();return}
    const me=state.players.find(p=>p.id===0);if(me&&!me.researching&&state.cities.some(c=>c.player===0)){showEvent('Choose research!');openTechTree();return}focusNextNeed()}
async function focusNextNeed(){
// Show what was just produced (from last turn events)
const lp=document.getElementById('last-produced');
const lastMsg=lp?.textContent;
const idle=state.cities.find(c=>c.player===0&&!c.producing);
if(idle){
    selectedCity=idle.id;selectedUnit=null;centerOnTile(idle.q,idle.r);updatePanel();
    if(lastMsg&&lastMsg.length>3){
        await gameAlert('Production Complete',lastMsg);
        if(lp)lp.textContent='';
    }
    openProdModal(idle.id);return}
selectNextUnit()}
async function fortifyUnit(){if(!selectedUnit)return;const d=await api(`/api/game/${gameId}/fortify/${selectedUnit}`,'POST');if(d.ok){state=d.state;showEvent(d.msg)}selectedUnit=null;selectNextUnit();updateUI();updatePanel()}
async function exploreUnit(){if(!selectedUnit)return;const d=await api(`/api/game/${gameId}/explore/${selectedUnit}`,'POST');if(d.ok){state=d.state;showEvent(d.msg)}selectedUnit=null;selectNextUnit();updateUI();updatePanel()}
async function gotoUnit(uid,q,r){
const oldU=state.units.find(u=>u.id===uid);
const oldQ=oldU?oldU.q:q,oldR=oldU?oldU.r:r;
const d=await api(`/api/game/${gameId}/goto`,'POST',{unit_id:uid,q,r});
if(d.ok){state=d.state;showEvent(d.msg);
// Animate if unit moved
const nu=state.units.find(u=>u.id===uid);
if(nu&&(nu.q!==oldQ||nu.r!==oldR)){const now=performance.now();if(!window._unitAnims)window._unitAnims={};window._unitAnims[uid]={fromQ:oldQ,fromR:oldR,toQ:nu.q,toR:nu.r,start:now,end:now+250};centerOnTile(nu.q,nu.r)}
if(!nu||nu.moves_left<=0){setTimeout(()=>{selectedUnit=null;selectNextUnit();updatePanel()},500)}
else{selectedUnit=null;selectNextUnit()}}
updateUI();updatePanel()}
async function workerBuild(imp){if(!selectedUnit)return;const d=await api(`/api/game/${gameId}/worker_build`,'POST',{unit_id:selectedUnit,improvement:imp});if(d.ok){state=d.state;showEvent(d.msg);selectedUnit=null;selectNextUnit()}else showEvent(d.msg);updateUI();updatePanel()}
async function disbandUnit(){if(!selectedUnit)return;const u=state.units.find(u=>u.id===selectedUnit);if(!u)return;if(!await gameConfirm(_t('disband_unit'),`${u.type.replace(/_/g,' ')} — ${_t('disband_confirm')}`))return;const d=await api(`/api/game/${gameId}/disband/${selectedUnit}`,'POST');if(d.ok){state=d.state;showEvent(d.msg)}selectedUnit=null;selectNextUnit();updateUI();updatePanel()}
async function autoWorker(){if(!selectedUnit)return;const d=await api(`/api/game/${gameId}/auto_worker/${selectedUnit}`,'POST');if(d.ok){state=d.state;showEvent(d.msg)}selectedUnit=null;selectNextUnit();updateUI();updatePanel()}
async function sentryUnit(){if(!selectedUnit)return;const d=await api(`/api/game/${gameId}/sentry/${selectedUnit}`,'POST');if(d.ok){state=d.state;showEvent(d.msg)}selectedUnit=null;selectNextUnit();updateUI();updatePanel()}
let rangedMode=false;
function startRangedAttack(){if(!selectedUnit)return;rangedMode=true;showEvent('Select target for ranged attack (click hex within range, ESC to cancel)')}
async function doRangedAttack(q,r){if(!selectedUnit||!rangedMode)return;rangedMode=false;const d=await api(`/api/game/${gameId}/ranged_attack`,'POST',{unit_id:selectedUnit,q,r});if(d.ok){state=d.state;showEvent(d.msg||'Ranged attack!');selectedUnit=null;selectNextUnit();updateUI();updatePanel()}else{showEvent(d.msg||'Cannot attack there')}}
async function spaceAction(){if(selectedUnit){const d=await api(`/api/game/${gameId}/skip/${selectedUnit}`,'POST');if(d.ok)state=d.state;selectedUnit=null;if(!selectNextUnit()){endTurn()}}else if(!selectNextUnit()){endTurn()}}
function selectNextUnit(){if(!state)return false;const u=state.units.find(u=>u.player===0&&u.moves_left>0&&!u.fortified&&!u.sentry&&!u.exploring&&!u.goto&&!u.building);if(u){selectedUnit=u.id;selectedCity=null;centerOnTile(u.q,u.r);updatePanel();return true}return false}
function centerOnTile(q,r){const[px,py]=h2p(q,r);camX=px*camZoom-canvas.width/2;camY=py*camZoom-canvas.height/2}
async function saveGame(){if(!gameId)return;openSaveDialog('save')}
async function openLoadDialog(){const sv=await api('/api/saves'),c=document.getElementById('load-content');c.innerHTML=sv.length?sv.map(s=>`<div class="save-item" onclick="loadGame('${s.filename}')"><div><b style="color:#c0c8e0">Turn ${s.turn} - ${s.players[0]||'?'}</b><div style="font-size:.8rem;color:#5060a0">${s.width}x${s.height} | ${s.players.length}p</div></div><div style="color:#ffd700">Load</div></div>`).join(''):'<p style="color:#5060a0;text-align:center;padding:2rem">No saves</p>';document.getElementById('load-modal').classList.add('active')}
function closeLoadDialog(){document.getElementById('load-modal').classList.remove('active')}
async function loadGame(fn){const d=await api(`/api/load/${fn}`,'POST');gameId=d.game_id;state=d.state;for(const k in tileCache)delete tileCache[k];closeLoadDialog();document.getElementById('menu-screen').style.display='none';document.getElementById('game-screen').style.display='block';setTimeout(()=>{initCanvas();centerOn();requestAnimationFrame(loop);updateUI();selectNextUnit();drawMini();showEvent('Game loaded!')},50)}
async function openCityDialog(){const u=state.units.find(u=>u.id===selectedUnit);if(!u||u.type!=='settler')return;pendingSettler=selectedUnit;document.getElementById('city-name-dialog').style.display='block';const inp=document.getElementById('city-name-input');
// Try to get civ-specific city names
let names;try{const r=await fetch('/static/city_names.json');if(r.ok){const d=await r.json();const me=state.players.find(p=>p.id===0);names=d[me?.civ]}}catch(e){}
if(!names)names=['Roma','Athena','Memphis','Babylon','Persepolis','Kyoto','Tenochtitlan','Carthago','Sparta','Troy','Delhi','Constantinople','Alexandria','Corinth','Thebes'];
const used=new Set(state.cities.map(c=>c.name));inp.value=names.find(n=>!used.has(n))||`City`;inp.focus();inp.select()}
function closeCityDialog(){document.getElementById('city-name-dialog').style.display='none';pendingSettler=null}
async function confirmFoundCity(){if(!pendingSettler)return;const n=document.getElementById('city-name-input').value.trim()||'City',d=await api(`/api/game/${gameId}/found_city`,'POST',{unit_id:pendingSettler,name:n});closeCityDialog();if(d.ok){state=d.state;selectedUnit=null;showEvent(d.msg);autoSave();updateUI();updatePanel();drawMini();
// Open production for the new city
const newCity=state.cities.find(c=>c.name===n&&c.player===0);if(newCity){selectedCity=newCity.id;centerOnTile(newCity.q,newCity.r);openProdModal(newCity.id)}}else{showEvent(d.msg);updateUI();updatePanel();drawMini()}}
async function setProduction(cid,t,n){const d=await api(`/api/game/${gameId}/production`,'POST',{city_id:cid,item_type:t,item_name:n});if(d.ok){state=d.state;showEvent(d.msg);focusNextNeed()}else{showEvent(d.msg);updatePanel()}}
async function setResearch(tn){const d=await api(`/api/game/${gameId}/research`,'POST',{tech_name:tn});if(d.ok){state=d.state;showEvent(d.msg);closeTechTree()}else showEvent(d.msg);updateUI()}
async function doDiplomacy(tp,a){const d=await api(`/api/game/${gameId}/diplomacy`,'POST',{target_player:tp,action:a});state=d.state;openDiplomacy()}
function showEvent(m){const l=document.getElementById('events-log'),d=document.createElement('div');d.className='event-msg';d.textContent=m;l.appendChild(d);setTimeout(()=>d.remove(),4000)}
// ======== CUSTOM DIALOG SYSTEM ========
function gameDialog(title,msg,buttons,inputOpts){
return new Promise(resolve=>{
const d=document.getElementById('game-dialog');
document.getElementById('dlg-title').textContent=title;
document.getElementById('dlg-msg').innerHTML=msg;
const inp=document.getElementById('dlg-input');
if(inputOpts){inp.style.display='block';inp.value=inputOpts.value||'';inp.placeholder=inputOpts.placeholder||'';setTimeout(()=>{inp.focus();inp.select()},100)}else{inp.style.display='none'}
const btns=document.getElementById('dlg-btns');btns.innerHTML='';
for(const b of buttons){const btn=document.createElement('button');btn.className='dlg-btn'+(b.class?' '+b.class:'');btn.textContent=b.text;btn.onclick=()=>{d.classList.remove('active');resolve(b.value!==undefined?b.value:inp?.value)};btns.appendChild(btn)}
d.classList.add('active');
// ESC closes with cancel/false
d.onkeydown=e=>{if(e.key==='Escape'){d.classList.remove('active');resolve(false)}
if(e.key==='Enter'&&inputOpts){d.classList.remove('active');resolve(inp.value)}}
})}
function gameConfirm(title,msg){return gameDialog(title,msg,[{text:_t('cancel'),value:false},{text:_t('confirm'),value:true,class:'primary'}])}
function gameAlert(title,msg){return gameDialog(title,msg,[{text:_t('ok'),value:true,class:'primary'}])}
function gamePrompt(title,msg,defaultVal){return gameDialog(title,msg,[{text:'Cancel',value:false},{text:'OK',value:null,class:'primary'}],{value:defaultVal||''})}

function render(){
    if(!state)return;
    const W=canvas.width,H=canvas.height;
    if(W===0||H===0)return;
    ctx.fillStyle='#0a1520';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.scale(camZoom,camZoom);
    const ox=camX/camZoom,oy=camY/camZoom,pad=S*3,tiles=state.tiles;

    // TERRAIN
    for(const k in tiles){const[q,r]=k.split(',').map(Number);const[px,py]=h2p(q,r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;let c=tileCache[k];if(!c){c=document.createElement('canvas');c.width=c.height=S*4;const x=c.getContext('2d');try{x.translate(S*2,S*2);renderTile(x,tiles[k],q,r)}catch(e){console.error('renderTile error:',k,tiles[k],e)}tileCache[k]=c}ctx.drawImage(c,sx-S*2,sy-S*2)}

    // ANIMATED WATER
    for(const k in tiles){const t=tiles[k];if(t!=='water'&&t!=='coast')continue;const[q,r]=k.split(',').map(Number);const[px,py]=h2p(q,r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;drawWaterFX(sx,sy,t,q,r)}

    // FOG OF WAR — disabled (was causing dark patches)

    // IMPROVEMENTS on map
    if(state.improvements){for(const k in state.improvements){const[q,r]=k.split(',').map(Number);const[px,py]=h2p(q,r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;const imp=state.improvements[k];ctx.save();ctx.globalAlpha=.7;
        if(imp.type==='farm'){ctx.fillStyle='#8B4513';ctx.fillRect(sx-S*.2,sy-S*.05,S*.4,S*.02);ctx.fillRect(sx-S*.2,sy+S*.08,S*.4,S*.02);ctx.fillRect(sx-S*.2,sy+S*.2,S*.4,S*.02);ctx.fillStyle='#228B22';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(sx-S*.12+i*S*.12,sy+S*.05,2,0,6.3);ctx.fill()}}
        else if(imp.type==='mine'){ctx.fillStyle='#666';ctx.beginPath();ctx.moveTo(sx,sy-S*.15);ctx.lineTo(sx-S*.12,sy+S*.05);ctx.lineTo(sx+S*.12,sy+S*.05);ctx.closePath();ctx.fill();ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(sx,sy-S*.02,2,0,6.3);ctx.fill()}
        else if(imp.type==='lumber_mill'){ctx.fillStyle='#8B5A2B';ctx.fillRect(sx-S*.15,sy-S*.03,S*.3,S*.06);ctx.fillStyle='#CD853F';ctx.beginPath();ctx.arc(sx,sy,S*.08,0,6.3);ctx.fill()}
        else if(imp.type==='trading_post'){ctx.fillStyle='#DAA520';ctx.beginPath();ctx.arc(sx,sy+S*.05,S*.08,0,6.3);ctx.fill();ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(sx,sy+S*.05,S*.05,0,6.3);ctx.fill()}
        ctx.restore()}}
    // ROADS on map
    if(state.roads){for(const k in state.roads){const[q,r]=k.split(',').map(Number);const[px,py]=h2p(q,r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;const rd=state.roads[k];
        // Draw road connections to adjacent road tiles
        const nb=hNb(q,r);for(const[nq,nr]of nb){if(state.roads[`${nq},${nr}`]){const[np2,ny2]=h2p(nq,nr);const nsx=np2-ox,nsy=ny2-oy;ctx.save();ctx.globalAlpha=.5;ctx.strokeStyle=rd.type==='railroad'?'#555':'#8B7355';ctx.lineWidth=rd.type==='railroad'?2.5:2;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo((sx+nsx)/2,(sy+nsy)/2);ctx.stroke();if(rd.type==='railroad'){ctx.strokeStyle='#777';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([])}ctx.restore()}}}}

    // TERRITORY — fill + dashed border on outermost hexes
    // Prefer authoritative tile_owners map from backend (includes tiles owned by
    // enemy cities that are hidden by fog of war). Fall back to deriving from
    // visible cities if server didn't send tile_owners.
    const terrMap={};
    if(state.tile_owners){
        for(const k in state.tile_owners){
            const pid=state.tile_owners[k];
            const pc=state.players.find(p=>p.id===pid)?.color||'#888';
            terrMap[k]={player:pid,color:pc};
        }
    } else {
        for(const city of state.cities){const pid=city.player;const pc=state.players.find(p=>p.id===pid)?.color||'#888';const br=city.border_radius||1;
            for(let dq=-br;dq<=br;dq++)for(let dr=-br;dr<=br;dr++){const tq=city.q+dq,tr=city.r+dr;
                if(hD(city.q,city.r,tq,tr)>br||!tiles[`${tq},${tr}`])continue;
                const k=`${tq},${tr}`;if(!terrMap[k])terrMap[k]={player:pid,color:pc}}}
    }
    // Second pass: render fill + borders
    for(const k in terrMap){const[q,r]=k.split(',').map(Number);const{player:pid,color:pc}=terrMap[k];
        const[px,py]=h2p(q,r),sx=px-ox,sy=py-oy;
        if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;
        // Tinted fill
        ctx.save();ctx.globalAlpha=.08;hexP(ctx,sx,sy,S);ctx.fillStyle=pc;ctx.fill();ctx.restore();
        // Draw border: for each neighbor, if not same player, draw the shared edge
        const nb=hNb(q,r);
        for(let ni=0;ni<6;ni++){
            const[nq,nr]=nb[ni];const nk=`${nq},${nr}`;
            const neighborSame=terrMap[nk]&&terrMap[nk].player===pid;
            if(neighborSame)continue;
            // Find the two vertices shared between this hex and neighbor ni
            // Neighbor ni center
            const[np,npy]=h2p(nq,nr);const nsx=np-ox,nsy=npy-oy;
            // Shared edge = two vertices closest to midpoint between hex centers
            const mx=(sx+nsx)/2,my=(sy+nsy)/2;
            // Find 2 vertices of THIS hex closest to midpoint
            const verts=[];
            for(let v=0;v<6;v++){
                const a=Math.PI/3*v-Math.PI/2;
                verts.push({x:sx+S*.96*Math.cos(a),y:sy+S*.96*Math.sin(a),
                    d:Math.hypot(sx+S*Math.cos(a)-mx,sy+S*Math.sin(a)-my)});
            }
            verts.sort((a,b)=>a.d-b.d);
            ctx.save();ctx.globalAlpha=.85;ctx.strokeStyle=pc;ctx.lineWidth=4.5;ctx.lineCap='round';
            ctx.beginPath();ctx.moveTo(verts[0].x,verts[0].y);ctx.lineTo(verts[1].x,verts[1].y);
            ctx.stroke();ctx.restore();}}

    // SELECTION
    if(selectedUnit){const u=state.units.find(u=>u.id===selectedUnit);if(u){const[px,py]=h2p(u.q,u.r),sx=px-ox,sy=py-oy;ctx.save();ctx.globalAlpha=.1+Math.sin(T*5)*.07;hexP(ctx,sx,sy,S+3);ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();hexP(ctx,sx,sy,S);ctx.fillStyle='#fff';ctx.fill();ctx.restore();if(u.moves_left>0)for(const[nq,nr]of hNb(u.q,u.r)){const k=`${nq},${nr}`;if(!tiles[k])continue;const t=tiles[k];if((t==='water'||t==='coast')&&u.cat!=='naval'&&u.cat!=='air')continue;if(t==='mountain'&&u.cat!=='air')continue;const[np,ny]=h2p(nq,nr),nx=np-ox,ns=ny-oy;const en=state.units.some(x=>x.q===nq&&x.r===nr&&x.player!==0)||state.cities.some(c=>c.q===nq&&c.r===nr&&c.player!==0);ctx.save();ctx.globalAlpha=.15+Math.sin(T*3)*.05;hexP(ctx,nx,ns,S);ctx.fillStyle=en?'#ff3030':'#30ff70';ctx.fill();ctx.globalAlpha=.5;hexP(ctx,nx,ns,S);ctx.strokeStyle=en?'#ff3030':'#30ff70';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);ctx.restore()}
    if(rangedMode){const ur=u.range||UNIT_RANGES[u.type]||0;if(ur>0)for(let dq=-ur;dq<=ur;dq++)for(let dr=-ur;dr<=ur;dr++){if(hD(0,0,dq,dr)>ur||hD(0,0,dq,dr)<1)continue;const tq=u.q+dq,tr=u.r+dr;const[tp,ty]=h2p(tq,tr),tx=tp-ox,ts=ty-oy;const hasEnemy=state.units.some(x=>x.q===tq&&x.r===tr&&x.player!==0)||state.cities.some(c=>c.q===tq&&c.r===tr&&c.player!==0);ctx.save();ctx.globalAlpha=hasEnemy?.3+Math.sin(T*4)*.1:.08;hexP(ctx,tx,ts,S);ctx.fillStyle=hasEnemy?'#ff6b35':'#ff6b35';ctx.fill();if(hasEnemy){ctx.globalAlpha=.7;hexP(ctx,tx,ts,S);ctx.strokeStyle='#ff6b35';ctx.lineWidth=2;ctx.stroke()}ctx.restore()}}}}
    if(selectedCity){const c=state.cities.find(c=>c.id===selectedCity);if(c){const br=c.border_radius||1;for(let dq=-br;dq<=br;dq++)for(let dr=-br;dr<=br;dr++){if(hD(0,0,dq,dr)>br)continue;const[px,py]=h2p(c.q+dq,c.r+dr);ctx.save();ctx.globalAlpha=.06+Math.sin(T*2+dq)*.03;hexP(ctx,px-ox,py-oy,S);ctx.fillStyle='#ffd700';ctx.fill();ctx.restore()}}}

    // CITIES
    for(const c of state.cities){const[px,py]=h2p(c.q,c.r),sx=px-ox,sy=py-oy;if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;drawCity(sx,sy,c,state.players.find(p=>p.id===c.player)?.color||'#888')}

    // UNITS (with move animation)
    const now=performance.now();
    for(const u of state.units){
        let ux=u.q,uy_r=u.r;
        const anim=window._unitAnims?.[u.id];
        let sx,sy;
        if(anim&&now<anim.end){
            // Interpolate position
            const t=Math.min(1,(now-anim.start)/(anim.end-anim.start));
            const ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; // easeInOutQuad
            const[fx,fy]=h2p(anim.fromQ,anim.fromR);
            const[tx,ty]=h2p(anim.toQ,anim.toR);
            sx=fx+(tx-fx)*ease-ox;
            sy=fy+(ty-fy)*ease-oy;
        }else{
            if(anim)delete window._unitAnims[u.id];
            const[px,py]=h2p(u.q,u.r);sx=px-ox;sy=py-oy;
        }
        if(sx<-pad||sx>W/camZoom+pad||sy<-pad||sy>H/camZoom+pad)continue;
        drawUnit(sx,sy,u,state.players.find(p=>p.id===u.player)?.color||'#888',u.id===selectedUnit)}

    // GOTO PATHS — draw for selected unit or all player units with goto
    for(const u of state.units){
        if(u.player!==0||!u.goto_path||u.goto_path.length<1)continue;
        if(u.id!==selectedUnit)continue; // only show for selected unit
        const path=u.goto_path;
        // Dashed golden line along path
        ctx.save();ctx.strokeStyle='#ffd700';ctx.lineWidth=2.5;ctx.globalAlpha=.7;ctx.setLineDash([6,4]);
        ctx.beginPath();
        const[ux,uy]=h2p(u.q,u.r);ctx.moveTo(ux-ox,uy-oy);
        for(const p of path){const[hx,hy]=h2p(p[0],p[1]);ctx.lineTo(hx-ox,hy-oy)}
        ctx.stroke();ctx.setLineDash([]);
        // Target marker — pulsing gold diamond
        if(u.goto){
            const[gx,gy]=h2p(u.goto.q,u.goto.r);const tx=gx-ox,ty=gy-oy;
            const pulse=.6+Math.sin(T*3)*.3;
            ctx.globalAlpha=pulse;ctx.fillStyle='#ffd700';
            ctx.beginPath();ctx.moveTo(tx,ty-S*.35);ctx.lineTo(tx+S*.2,ty);ctx.lineTo(tx,ty+S*.35);ctx.lineTo(tx-S*.2,ty);ctx.closePath();ctx.fill();
            ctx.strokeStyle='#b8860b';ctx.lineWidth=1.5;ctx.stroke();
            // Turns text (actual turns based on road-discounted cost)
            const turns=u.goto_turns||u.goto_path.length;
            ctx.globalAlpha=.9;ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
            ctx.fillText(turns+'t',tx,ty+S*.55);
        }
        ctx.restore();
    }

    // PENDING GOTO PREVIEW — cyan dashed line awaiting confirmation click
    if(window._pendingGoto&&window._pendingGoto.uid===selectedUnit){
        const pg=window._pendingGoto;
        const pu=state.units.find(u=>u.id===pg.uid);
        if(pu&&pg.path&&pg.path.length>0){
            ctx.save();ctx.strokeStyle='#4fd4ff';ctx.lineWidth=3;ctx.globalAlpha=.55+Math.sin(T*4)*.25;ctx.setLineDash([8,5]);
            ctx.beginPath();
            const[ux,uy]=h2p(pu.q,pu.r);ctx.moveTo(ux-ox,uy-oy);
            for(const p of pg.path){const[hx,hy]=h2p(p[0],p[1]);ctx.lineTo(hx-ox,hy-oy)}
            ctx.stroke();ctx.setLineDash([]);
            // Target ring (pulsing cyan)
            const[gx,gy]=h2p(pg.q,pg.r);const tx=gx-ox,ty=gy-oy;
            ctx.globalAlpha=.8;ctx.strokeStyle='#4fd4ff';ctx.lineWidth=2.5;
            ctx.beginPath();ctx.arc(tx,ty,S*.42,0,Math.PI*2);ctx.stroke();
            // Turns + "?" confirm hint
            ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
            ctx.fillText((pg.turns||pg.path.length)+'t ?',tx,ty+S*.6);
            ctx.restore();
        }
    }

    ctx.restore();
}

// Clean, bold flat colors
const TPAL={
    grass:  [106,168,60],  plains: [218,190,82],  forest: [55,115,42],
    hills:  [175,120,65],  mountain:[140,145,158], desert: [225,205,148],
    water:  [42,95,155],   coast:  [72,135,175],
};

function renderTile(c,type,q,r){
    const variant=((q*7+r*13)&3);  // 0-3 based on position
    const tImg=terrImgs[`${type}_${variant}`]||terrImgs[type];
    const h1=Hf(q,r),h2=Hf(q+999,r+777),h3=Hf(q+333,r+555);
    if(tImg&&tImg.complete&&tImg.naturalWidth>0){
        hexP(c,0,0,S);c.save();c.clip();
        // Draw tile image centered, NO rotation/scale — just fill the hex
        c.drawImage(tImg,-S,-S,S*2,S*2);
        // No overlay — clean tiles
        c.restore();
        // Clean hex border
        hexP(c,0,0,S);c.strokeStyle='rgba(20,15,5,.15)';c.lineWidth=.7;c.stroke();
        return;
    }
    // Fallback procedural rendering
    const base=TPAL[type]||[80,80,80];
    const j=(h1-.5)*6;
    hexP(c,0,0,S);
    c.fillStyle=`rgb(${base[0]+j|0},${base[1]+j|0},${base[2]+j|0})`;
    c.fill();

    hexP(c,0,0,S);c.save();c.clip();

    // Subtle inner glow — clean board feel
    const ao=c.createRadialGradient(0,-S*.15,S*.15,0,S*.1,S*1.05);
    ao.addColorStop(0,'rgba(255,255,255,.06)');ao.addColorStop(.5,'rgba(0,0,0,0)');ao.addColorStop(1,'rgba(0,0,0,.12)');
    c.fillStyle=ao;c.fillRect(-S*2,-S*2,S*4,S*4);

    // ===== ICONIC TERRAIN ELEMENTS =====
    if(type==='grass'){
        // Simple rolling green — subtle darker patches
        for(let i=0;i<4;i++){
            const dx=(Hf(q*7+i,r*3+i)-.5)*S*.8,dy=(Hf(q*3+i,r*7+i)-.5)*S*.6;
            c.fillStyle='rgba(75,140,45,.15)';
            c.beginPath();c.ellipse(dx,dy,S*.25+h1*S*.1,S*.15,Hf(i,q)*1.5,0,6.3);c.fill();
        }
    }
    else if(type==='plains'){
        // Wheat sheaves — clean iconic style
        c.lineCap='round';c.lineJoin='round';
        const sx2=[[-.3,-.1],[.15,.05],[-.1,.2],[.28,-.2]];
        for(const[ox,oy]of sx2){
            const bx=ox*S,by=oy*S;
            // Stalk bundle
            for(let i=-1;i<=1;i++){
                c.strokeStyle='rgba(180,150,50,.5)';c.lineWidth=1.2;
                c.beginPath();c.moveTo(bx+i*2,by+S*.12);c.lineTo(bx+i*1.5,by-S*.12);c.stroke();
            }

            c.beginPath();c.ellipse(bx,by-S*.14,3,5,0,0,6.3);c.fill();
        }
        c.lineCap='butt';c.lineJoin='miter';
    }
    else if(type==='forest'){
        // Clean triangular trees — Catan style
        const trees=[[0,-.05,.9],[-.28,.12,.7],[.25,.08,.75],[-.12,-.22,.65],[.15,.25,.6]];
        for(const[tx,ty,ts]of trees){

            // Tree — simple triangle layers
            c.fillStyle='#3a7a28';
            c.beginPath();c.moveTo(bx,by-sz*.9);c.lineTo(bx-sz*.55,by+sz*.05);c.lineTo(bx+sz*.55,by+sz*.05);c.closePath();c.fill();
            c.fillStyle='#4a8a35';
            c.beginPath();c.moveTo(bx,by-sz*.55);c.lineTo(bx-sz*.45,by+sz*.15);c.lineTo(bx+sz*.45,by+sz*.15);c.closePath();c.fill();
            // Highlight
            c.fillStyle='rgba(255,255,255,.08)';
            c.beginPath();c.moveTo(bx,by-sz*.9);c.lineTo(bx-sz*.15,by-sz*.3);c.lineTo(bx,by-sz*.4);c.closePath();c.fill();
        }
    }
    else if(type==='hills'){
        // Clay/brick hills — warm Catan style
        const hills=[[-.15,0,.4,.22],[.2,-.05,.32,.18],[-.02,.2,.25,.14]];
        for(const[hx,hy,hw,hh]of hills){
            const cx=hx*S,cy=hy*S;

            c.fillStyle='rgba(155,100,48,.35)';
            c.beginPath();c.ellipse(cx,cy,S*hw,S*hh,0,Math.PI,0);c.fill();
            // Highlight
            c.fillStyle='rgba(200,145,72,.2)';
            c.beginPath();c.ellipse(cx-S*hw*.2,cy-S*hh*.3,S*hw*.5,S*hh*.4,0,Math.PI,0);c.fill();
        }
        // Brick/clay blocks
        for(let i=0;i<3;i++){
            const bx=(Hf(i*7+q,i*3+r)-.5)*S*.5,by=S*(.08+Hf(i+q,r)*.15);
            c.fillStyle='rgba(160,95,45,.3)';c.fillRect(bx-3,by-2,6,4);
            c.strokeStyle='rgba(120,70,30,.2)';c.lineWidth=.5;c.strokeRect(bx-3,by-2,6,4);
        }
    }
    else if(type==='mountain'){
        // Bold geometric mountains — Catan ore style
        // Back peak
        c.fillStyle='#8a8a98';c.beginPath();c.moveTo(S*.25,-S*.35);c.lineTo(S*.5,S*.3);c.lineTo(0,S*.3);c.closePath();c.fill();
        // Main peak — dark side
        c.fillStyle='#6a6a78';c.beginPath();c.moveTo(0,-S*.7);c.lineTo(S*.4,S*.32);c.lineTo(0,S*.32);c.closePath();c.fill();
        // Main peak — light side
        c.fillStyle='#9898a8';c.beginPath();c.moveTo(0,-S*.7);c.lineTo(-S*.38,S*.32);c.lineTo(0,S*.32);c.closePath();c.fill();
        // Snow cap
        c.fillStyle='#e5e5f0';c.beginPath();c.moveTo(0,-S*.7);c.lineTo(-S*.1,-S*.35);c.lineTo(S*.12,-S*.38);c.closePath();c.fill();
        // Rock texture lines
        c.strokeStyle='rgba(60,60,72,.12)';c.lineWidth=.8;
        c.beginPath();c.moveTo(-S*.15,-S*.1);c.lineTo(S*.1,0);c.stroke();
        c.beginPath();c.moveTo(-S*.1,S*.15);c.lineTo(S*.15,S*.1);c.stroke();
    }
    else if(type==='desert'){
        // Clean sandy desert with gentle dunes
        for(let i=0;i<3;i++){
            const dy=(i-1)*S*.2;
            c.fillStyle='rgba(210,185,115,.15)';
            c.beginPath();c.ellipse(0,dy,S*.6,S*.1,0,0,6.3);c.fill();
        }
        // Cactus on some tiles
        if(h1>.65){
            c.strokeStyle='#6a9a40';c.lineWidth=2.5;c.lineCap='round';
            c.beginPath();c.moveTo(0,S*.12);c.lineTo(0,-S*.18);c.stroke();
            c.lineWidth=2;
            c.beginPath();c.moveTo(0,-S*.06);c.quadraticCurveTo(-S*.08,-S*.08,-S*.1,-S*.16);c.stroke();
            c.beginPath();c.moveTo(0,-S*.02);c.quadraticCurveTo(S*.07,-S*.04,S*.08,-S*.12);c.stroke();
            c.lineCap='butt';

    }
    else if(type==='water'){
        // Deep blue ocean — clean
        c.fillStyle='rgba(30,70,130,.08)';c.fillRect(-S,-S,S*2,S*2);
    }
    else if(type==='coast'){

        c.fillStyle='rgba(60,120,165,.06)';c.fillRect(-S,-S,S*2,S*2);
        c.fillStyle='rgba(200,190,150,.06)';
        c.beginPath();c.ellipse(S*.2,S*.1,S*.3,S*.15,.4,0,6.3);c.fill();
    }

    c.restore();
    // Bold hex border — clean board game feel
    hexP(c,0,0,S);c.strokeStyle='rgba(40,30,15,.25)';c.lineWidth=1.2;c.stroke();
}

function drawWaterFX(sx,sy,type,q,r){
    hexP(ctx,sx,sy,S);ctx.save();ctx.clip();
    const deep=type==='water';

        ctx.strokeStyle=`rgba(80,150,220,${0.06+Math.sin(T*.7+i*2+r*.3)*.02})`;ctx.lineWidth=1;

    }

function drawCity(sx,sy,city,col){

    // Main building
    ctx.fillStyle=dk(col,10);ctx.beginPath();ctx.roundRect(sx-s*.5,sy-s*.7,s*1,s*.5,1);ctx.fill();
    // Roof
    ctx.fillStyle=dk(col,40);ctx.beginPath();ctx.moveTo(sx-s*.6,sy-s*.7);ctx.lineTo(sx,sy-s*1.15);ctx.lineTo(sx+s*.6,sy-s*.7);ctx.closePath();ctx.fill();

        ctx.fillStyle=dk(col,35);ctx.beginPath();ctx.moveTo(sx+s*.55,sy-s*1.2);ctx.lineTo(sx+s*.8,sy-s*1.5);ctx.lineTo(sx+s*1.05,sy-s*1.2);ctx.closePath();ctx.fill()}
    if(pop>=4){ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(sx-s*1,sy-s*1,s*.35,s*.8,1);ctx.fill();
        ctx.fillStyle=dk(col,35);ctx.beginPath();ctx.moveTo(sx-s*1.05,sy-s*1);ctx.lineTo(sx-s*.82,sy-s*1.35);ctx.lineTo(sx-s*.6,sy-s*1);ctx.closePath();ctx.fill()}
    // Windows
    ctx.fillStyle='rgba(255,220,100,.55)';
    ctx.fillRect(sx-s*.3,sy-s*.55,s*.18,s*.18);ctx.fillRect(sx+s*.12,sy-s*.55,s*.18,s*.18);

    ctx.fillStyle='#3a2a1a';ctx.fillRect(sx+s*1.2,sy-s*1.6,1.5,s*1.2);
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(sx+s*1.2+1.5,sy-s*1.6);ctx.lineTo(sx+s*1.2+s*.5,sy-s*1.35);ctx.lineTo(sx+s*1.2+1.5,sy-s*1.1);ctx.closePath();ctx.fill();

    ctx.fillStyle='rgba(0,0,0,.85)';ctx.beginPath();ctx.arc(sx,sy-s*1.8,7.5,0,6.3);ctx.fill();

function drawUnit(sx,sy,unit,col,sel){
    const bob=Math.sin(T*1.8+unit.id)*.8;const uy=sy-2+bob;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.15)';ctx.beginPath();ctx.ellipse(sx,sy+3,S*.32,S*.1,0,0,6.3);ctx.fill();
    if(sel){
        // Pulsing hex highlight under unit
        ctx.save();const glow=.5+Math.sin(T*4)*.3;
        ctx.globalAlpha=.12+Math.sin(T*3)*.06;hexP(ctx,sx,sy,S);ctx.fillStyle='#ffd700';ctx.fill();
        // Thick golden ring
        ctx.globalAlpha=glow;ctx.shadowColor='rgba(255,200,0,.8)';ctx.shadowBlur=22;
        ctx.strokeStyle=`rgba(255,215,0,${glow})`;ctx.lineWidth=3.5;
        ctx.beginPath();ctx.arc(sx,sy-1,S*.48,0,6.3);ctx.stroke();
        // Inner white ring
        ctx.shadowBlur=0;ctx.globalAlpha=glow*.4;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(sx,sy-1,S*.42,0,6.3);ctx.stroke();
        ctx.restore()}
    ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(sx,sy+1,S*.3,S*.08,0,0,6.3);ctx.fill();
    ctx.strokeStyle=dk(col,40);ctx.lineWidth=.8;ctx.stroke();ctx.shadowBlur=0;
    // Draw unit — PNG sprite with player color ring
    const uImg=unitImgs[unit.type];
    const us=S*.95;  // bigger units
    if(uImg&&uImg.complete&&uImg.naturalWidth>0){
        ctx.drawImage(uImg,sx-us/2,uy-us/2,us,us);
    }else{
        ctx.save();ctx.translate(sx,uy);const sc=S/26;ctx.scale(sc,sc);drawSprite(ctx,unit.type,col);ctx.restore();
    }
    // Player color circle under unit — always visible
    ctx.save();ctx.globalAlpha=.85;
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(sx+S*.3,sy+S*.12,S*.14,0,6.3);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
    if(unit.hp<100){const r=S*.32,bw=r*.8,pct=unit.hp/100,by=sy+S*.18;ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(sx-bw,by,bw*2,2.5,1);ctx.fill();ctx.fillStyle=pct>.6?'#4a8a3a':pct>.3?'#b8982a':'#aa3030';ctx.beginPath();ctx.roundRect(sx-bw,by,bw*2*pct,2.5,1);ctx.fill()}
    if(unit.player===0&&unit.moves_left>0){ctx.save();ctx.shadowColor='#50d870';ctx.shadowBlur=4;ctx.fillStyle='#50d870';ctx.beginPath();ctx.arc(sx+S*.28,sy-S*.32,2.5,0,6.3);ctx.fill();ctx.restore()}
    if(unit.fortified){ctx.strokeStyle='#5080c0';ctx.lineWidth=1.2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(sx,sy,S*.38,0,6.3);ctx.stroke();ctx.setLineDash([])}
    if(unit.sentry){ctx.strokeStyle='#f1c40f';ctx.lineWidth=1.2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(sx,sy,S*.38,0,6.3);ctx.stroke();ctx.setLineDash([])}
    if(unit.exploring){ctx.strokeStyle='#2ecc71';ctx.lineWidth=1.2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(sx,sy,S*.38,0,6.3);ctx.stroke();ctx.setLineDash([])}
    if(unit.goto&&unit.player===0&&!window._spectateMode&&!unit.goto_path){
        // Fallback arrow if no path computed
        ctx.save();ctx.globalAlpha=.7;ctx.fillStyle='#ffd700';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
        ctx.fillText('\u2192',sx,sy-S*.45);ctx.restore()}
    ctx.restore();
}

        c.strokeStyle='#503818';c.lineWidth=2.2;c.beginPath();c.moveTo(-9,-3);c.lineTo(7,-7);c.stroke();
        c.strokeStyle='#907860';c.lineWidth=1;c.beginPath();c.moveTo(-9,-3);c.quadraticCurveTo(-11,-1,-10,1);c.stroke();
        c.fillStyle='#707070';c.beginPath();c.arc(-10,0,2.8,0,6.3);c.fill();
        for(const wx of[-7,7]){c.fillStyle='#402810';c.beginPath();c.arc(wx,8,3.2,0,6.3);c.fill();c.strokeStyle='#2a1808';c.lineWidth=.8;c.stroke()}
    }
    else if(type==='musketman'||type==='rifleman'){
        const rfl=type==='rifleman';
        c.fillStyle=col;c.beginPath();c.roundRect(-3,-7,6,9,1.5);c.fill();c.fillStyle=dk(col,12);c.fillRect(-3,-7,6,2);
        c.fillStyle=skin;c.beginPath();c.arc(0,-11,3.5,0,6.3);c.fill();
        c.fillStyle=rfl?'#2a2a2a':'#1a1a4a';
        if(rfl){c.beginPath();c.roundRect(-3.5,-17,7,6,1.5);c.fill();c.fillRect(-4.5,-11.5,9,1.5)}
        else{c.fillRect(-5,-14,10,3);c.beginPath();c.moveTo(-4,-14);c.lineTo(0,-17);c.lineTo(4,-14);c.closePath();c.fill()}
        c.fillStyle='#3a2a1a';c.fillRect(-2.5,2,2.2,5.5);c.fillRect(.5,2,2.2,5.5);c.fillStyle='#2a1a0a';c.fillRect(-2.5,6,2.2,1.5);c.fillRect(.5,6,2.2,1.5);
        c.strokeStyle='#3a3028';c.lineWidth=2.2;c.beginPath();c.moveTo(4.5,1);c.lineTo(4.5,-15);c.stroke();c.fillStyle=dkM;c.beginPath();c.roundRect(3,-16,3,3,1);c.fill();
        if(rfl){c.strokeStyle=metal;c.lineWidth=1;c.beginPath();c.moveTo(4.5,-16);c.lineTo(4.5,-20);c.stroke()}
    }
    else if(type==='infantry'){
        c.fillStyle='#4a5438';c.beginPath();c.roundRect(-3,-7,6,9,1.5);c.fill();
        c.fillStyle=skin;c.beginPath();c.arc(0,-11,3.5,0,6.3);c.fill();
        c.fillStyle='#3a4230';c.beginPath();c.arc(0,-12.5,4.8,.6,Math.PI-.6);c.fill();
        c.fillStyle='#3a3028';c.fillRect(-2.5,2,2.2,5.5);c.fillRect(.5,2,2.2,5.5);c.fillStyle='#2a2018';c.fillRect(-2.5,6,2.2,1.5);c.fillRect(.5,6,2.2,1.5);
        c.strokeStyle='#3a3028';c.lineWidth=1.8;c.beginPath();c.moveTo(5,3);c.lineTo(3.5,-13);c.stroke();
        c.fillStyle='#4a4a38';c.beginPath();c.roundRect(-6.5,-6,3,7,1);c.fill();
        c.strokeStyle='#5a5840';c.lineWidth=.8;c.beginPath();c.moveTo(-3,-5);c.lineTo(3,-5);c.moveTo(0,-7);c.lineTo(0,2);c.stroke();
    }
    else if(type==='artillery'){
        c.fillStyle=dkM;c.beginPath();c.roundRect(-2.5,-9,5,13,1.5);c.fill();c.fillStyle=metal;c.beginPath();c.roundRect(-3,-11,6,3.5,1.5);c.fill();
        c.fillStyle=wood;c.beginPath();c.roundRect(-8,3,16,3.5,1);c.fill();
        for(const wx of[-7,7]){c.fillStyle='#3a3a3a';c.beginPath();c.arc(wx,8,3.8,0,6.3);c.fill();c.strokeStyle='#282828';c.lineWidth=.8;c.stroke();for(let i=0;i<6;i++){const a=i*Math.PI/3;c.beginPath();c.moveTo(wx,8);c.lineTo(wx+Math.cos(a)*3.2,8+Math.sin(a)*3.2);c.stroke()}}
    }
    else if(type==='tank'){
        c.fillStyle='#303028';c.beginPath();c.roundRect(-11,0,22,7,3);c.fill();c.strokeStyle='#222';c.lineWidth=1;c.stroke();for(let i=-9;i<=9;i+=3){c.strokeStyle='#3a3a32';c.lineWidth=.5;c.beginPath();c.moveTo(i,0);c.lineTo(i,7);c.stroke()}
        c.fillStyle='#4a5238';c.beginPath();c.moveTo(-10,-1);c.lineTo(-7,-6);c.lineTo(9,-6);c.lineTo(11,-1);c.closePath();c.fill();
        c.fillStyle='#3a4230';c.beginPath();c.roundRect(-4,-9,11,4.5,2);c.fill();c.fillStyle='#303828';c.beginPath();c.roundRect(7,-8,9,2.5,1);c.fill();c.fillStyle=col;c.beginPath();c.arc(1,-7,2,0,6.3);c.fill();
    }
    else if(type==='fighter'||type==='bomber'){
        const w=type==='bomber';
        c.fillStyle=col;c.beginPath();c.moveTo(13,0);c.quadraticCurveTo(10,-3.5,w?-9:-7,-1);c.lineTo(w?-11:-9,0);c.lineTo(w?-9:-7,1);c.quadraticCurveTo(10,3.5,13,0);c.closePath();c.fill();
        c.fillStyle=dk(col,18);const ws=w?13:11;
        c.beginPath();c.moveTo(w?-2:0,-1);c.lineTo(w?-4:-2,-ws);c.lineTo(w?4:3,-ws);c.lineTo(w?3:2,-1);c.closePath();c.fill();
        c.beginPath();c.moveTo(w?-2:0,1);c.lineTo(w?-4:-2,ws);c.lineTo(w?4:3,ws);c.lineTo(w?3:2,1);c.closePath();c.fill();
        c.fillStyle=dk(col,28);c.beginPath();c.moveTo(-9,-1);c.lineTo(-11,-5.5);c.lineTo(-8,-5.5);c.lineTo(-7,-1);c.closePath();c.fill();c.beginPath();c.moveTo(-9,1);c.lineTo(-11,5.5);c.lineTo(-8,5.5);c.lineTo(-7,1);c.closePath();c.fill();
        c.fillStyle='rgba(130,180,230,.5)';c.beginPath();c.ellipse(7,0,3.5,1.8,0,0,6.3);c.fill();
    }
    else if(type==='galley'||type==='caravel'||type==='ironclad'){
        const hc=type==='ironclad'?'#4a4a58':wood;
        c.fillStyle=hc;c.beginPath();c.moveTo(-11,2);c.lineTo(-9,-2);c.lineTo(9,-2);c.lineTo(13,0);c.lineTo(11,5);c.lineTo(-9,5);c.closePath();c.fill();c.strokeStyle=dk(hc,22);c.lineWidth=1;c.stroke();
        if(type==='ironclad'){c.fillStyle='#303038';c.fillRect(-1,-9,3,7);c.fillStyle='#484850';c.beginPath();c.roundRect(-2,-10,5,2.5,1);c.fill();c.fillStyle='#3a3a48';c.beginPath();c.roundRect(2,-6,6,3.5,1.5);c.fill();c.fillStyle='#4a4a58';c.beginPath();c.roundRect(8,-5.5,6,2.5,1);c.fill()}
        else{c.strokeStyle='#503818';c.lineWidth=2;c.beginPath();c.moveTo(0,0);c.lineTo(0,-15);c.stroke();c.fillStyle='#e0d8c0';c.beginPath();c.moveTo(0,-14);c.quadraticCurveTo(9,-9,0,-3);c.closePath();c.fill();c.strokeStyle='#b0a888';c.lineWidth=.5;c.stroke();if(type==='caravel'){c.strokeStyle='#503818';c.lineWidth=1.5;c.beginPath();c.moveTo(-5,0);c.lineTo(-5,-11);c.stroke();c.fillStyle='#e0d8c0';c.beginPath();c.moveTo(-5,-10);c.quadraticCurveTo(3,-7,-5,-2);c.closePath();c.fill()}}
        c.strokeStyle='rgba(50,100,170,.25)';c.lineWidth=1;c.beginPath();c.moveTo(-11,4);c.bezierCurveTo(-5,6,5,6,13,4);c.stroke();
    }
    else{c.fillStyle=col;c.beginPath();c.roundRect(-3,-7,6,9,1.5);c.fill();c.fillStyle=skin;c.beginPath();c.arc(0,-11,3.5,0,6.3);c.fill();c.fillStyle='#3a2a1a';c.fillRect(-2,2,2,5.5);c.fillRect(1,2,2,5.5)}
    c.lineCap='butt';c.lineJoin='miter';
}

function dk(h,n){return 'rgb('+Math.max(0,parseInt(h.slice(1,3),16)-n)+','+Math.max(0,parseInt(h.slice(3,5),16)-n)+','+Math.max(0,parseInt(h.slice(5,7),16)-n)+')'}


// ======== MINIMAP ========
const MP={grass:'#6aa83c',plains:'#dabe52',forest:'#37732a',hills:'#af7841',mountain:'#8c919e',desert:'#e1cd94',water:'#2a5f9b',coast:'#4887af'};
function drawMini(){if(!state)return;miniX.fillStyle='#060a14';miniX.fillRect(0,0,200,150);const sc=Math.min(200/state.width,150/state.height);for(const k in state.tiles){const[q,r]=k.split(',').map(Number);miniX.fillStyle=MP[state.tiles[k]]||'#333';miniX.fillRect(q*sc,r*sc,Math.max(2,sc),Math.max(2,sc))}for(const c of state.cities){miniX.fillStyle=state.players.find(p=>p.id===c.player)?.color||'#888';miniX.fillRect(c.q*sc-1,c.r*sc-1,4,4)}const vl=(camX/camZoom)/(S3*S)*sc,vt=(camY/camZoom)/(1.5*S)*sc,vw=(canvas.width/camZoom)/(S3*S)*sc,vh=(canvas.height/camZoom)/(1.5*S)*sc;miniX.strokeStyle='rgba(255,215,0,.6)';miniX.lineWidth=1.5;miniX.strokeRect(vl,vt,vw,vh)}
miniC.onclick=e=>{const r=miniC.getBoundingClientRect(),sc=Math.min(200/state.width,150/state.height),[px,py]=h2p(Math.round((e.clientX-r.left)/sc),Math.round((e.clientY-r.top)/sc));camX=px*camZoom-canvas.width/2;camY=py*camZoom-canvas.height/2};
document.getElementById('city-name-input').onkeydown=e=>{if(e.key==='Enter')confirmFoundCity();if(e.key==='Escape')closeCityDialog()};
document.getElementById('auth-pass').onkeydown=e=>{if(e.key==='Enter')doLogin()};
// Apply language to static elements
applyLang();
</script>
